<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wizard Crawl</title>
</head>
<body>

<div id="lobby">
  <h1>WIZARD CRAWL</h1>
  <div class="sub">co-op roguelike wave survival</div>
  <div class="lobby-box">
    <h3>HOST GAME</h3>
    <button class="btn btn-primary" id="btn-host">CREATE ROOM</button>
    <div id="host-info" style="display:none">
      <div class="room-code" id="room-code"></div>
      <div class="status" id="host-status">waiting for partner...</div>
    </div>
  </div>
  <div class="lobby-box">
    <h3>JOIN GAME</h3>
    <input type="text" id="join-code" placeholder="CODE" maxlength="6">
    <button class="btn" id="btn-join">CONNECT</button>
    <div class="status" id="join-status"></div>
  </div>
  <div class="lobby-box">
    <h3>SOLO RUN</h3>
    <button class="btn" id="btn-solo">PLAY SOLO</button>
  </div>
  <div id="error-msg"></div>
  <div id="version-display"></div>
</div>

<div id="select-screen">
  <div id="class-detail"></div>
  <div id="select-main">
    <h2>CHOOSE YOUR WIZARD</h2>
    <div class="class-grid" id="class-grid"></div>
    <button class="btn btn-primary" id="btn-ready" style="margin-top:10px">READY</button>
    <div class="status" id="select-status" style="margin-top:6px"></div>
  </div>
</div>

<div id="upgrade-screen">
  <h2>CHOOSE AN UPGRADE</h2>
  <div class="upgrade-grid" id="upgrade-grid"></div>
</div>

<div id="hud">
  <div class="hud-side" id="hud-p1"></div>
  <div style="text-align:center;font-size:10px;color:#443355" id="hud-room"></div>
  <div class="hud-side" id="hud-p2"></div>
</div>
<div id="skill-bar"></div>
<div id="floor-display">WAVE <span id="wave-num">1</span> / 20</div>
<div id="gold-display">Gold: <span id="gold-val">0</span></div>
<button id="shop-btn" title="Open Shop (B)">SHOP</button>
<button id="fullscreen-btn" title="Fullscreen (F11)">⛶</button>

<div id="gameover">
  <h2>RUN OVER</h2>
  <div class="stats" id="go-stats"></div>
  <button class="btn btn-primary" id="btn-restart">TRY AGAIN</button>
</div>

<div id="victory-screen">
  <h2>VICTORY</h2>
  <div class="sub-victory">The Archlord has fallen!</div>
  <div class="stats" id="victory-stats"></div>
  <button class="btn btn-primary" id="btn-victory-restart">PLAY AGAIN</button>
</div>

<div id="shop-screen">
  <h2>SHOP</h2>
  <div class="shop-gold">Gold: <span id="shop-gold">0</span></div>
  <div class="shop-grid" id="shop-grid"></div>
  <div class="shop-hint">Press 1-5 to buy &middot; ESC to close</div>
  <button class="btn btn-primary" id="shop-close">CONTINUE</button>
</div>

<div id="pause-screen">
  <h2>PAUSED</h2>
  <div class="pause-class-name" id="pause-class-name"></div>
  <div class="pause-passive" id="pause-passive"></div>
  <div class="pause-spells" id="pause-spells"></div>
  <div class="pause-hint">Press ESC to resume</div>
</div>

<canvas id="c"></canvas>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
