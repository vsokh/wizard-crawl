<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wizard Crawl</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0812;overflow:hidden;font-family:'Courier New',monospace;color:#ccbbdd}
body.in-game{cursor:none}
canvas{display:block}

/* ── LOBBY ── */
#lobby{position:fixed;inset:0;z-index:100;background:#0a0812;display:flex;flex-direction:column;align-items:center;justify-content:center}
#lobby h1{font-size:42px;letter-spacing:4px;margin-bottom:4px;background:linear-gradient(135deg,#ff6633,#bb44ff,#3399ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#lobby .sub{color:#443355;font-size:13px;margin-bottom:30px}
.lobby-box{background:rgba(20,14,30,0.8);border:1px solid rgba(120,80,180,0.2);border-radius:8px;padding:20px;width:320px;text-align:center;margin-bottom:12px}
.lobby-box h3{font-size:14px;color:#9977bb;margin-bottom:10px;letter-spacing:2px}
.btn{padding:10px 24px;font-family:inherit;font-size:13px;background:rgba(40,25,60,0.8);color:#9977bb;border:1px solid rgba(120,80,180,0.3);border-radius:4px;cursor:pointer;letter-spacing:1px;transition:all .2s}
.btn:hover{background:rgba(60,35,90,0.9);color:#ccaaee;border-color:rgba(150,100,220,0.5)}
.btn-primary{background:rgba(80,40,140,0.5);color:#ccaaff;border-color:rgba(150,80,255,0.4)}
input[type=text]{padding:8px 12px;font-family:inherit;font-size:14px;background:rgba(15,10,25,0.9);color:#ccbbdd;border:1px solid rgba(100,70,160,0.3);border-radius:4px;text-align:center;width:140px;letter-spacing:3px}
.room-code{font-size:28px;color:#bb88ff;letter-spacing:6px;margin:8px 0;font-weight:bold}
.status{font-size:11px;color:#554466;margin-top:6px}
#error-msg{color:#ff6644;font-size:11px;margin-top:6px;min-height:14px}

/* ── SELECT ── */
#select-screen{display:none;position:fixed;inset:0;z-index:90;background:#0a0812;flex-direction:column;align-items:center;justify-content:center}
#select-screen h2{font-size:22px;color:#bb88ff;letter-spacing:3px;margin-bottom:14px}
.class-grid{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:16px}
.class-card{width:155px;padding:12px;border:1px solid rgba(100,60,160,0.2);border-radius:6px;background:rgba(18,12,28,0.8);cursor:pointer;transition:all .2s;text-align:center}
.class-card:hover{border-color:rgba(150,100,220,0.5);background:rgba(25,18,40,0.9)}
.class-card.selected{border-color:#bb88ff;background:rgba(40,25,70,0.5)}
.class-card .cname{font-size:13px;font-weight:bold;margin-bottom:3px}
.class-card .cdesc{font-size:10px;color:#665577;line-height:1.4}

/* ── UPGRADE OVERLAY ── */
#upgrade-screen{display:none;position:fixed;inset:0;z-index:80;background:rgba(6,4,12,0.92);flex-direction:column;align-items:center;justify-content:center}
#upgrade-screen h2{font-size:20px;color:#bbaa44;letter-spacing:2px;margin-bottom:16px}
.upgrade-grid{display:flex;gap:12px}
.upgrade-card{width:180px;padding:16px;border:1px solid rgba(180,150,50,0.25);border-radius:6px;background:rgba(20,16,10,0.9);cursor:pointer;text-align:center;transition:all .2s}
.upgrade-card:hover{border-color:rgba(220,180,60,0.5);background:rgba(30,25,15,0.95);transform:translateY(-2px)}
.upgrade-card .uname{font-size:13px;color:#ddcc66;font-weight:bold;margin-bottom:4px}
.upgrade-card .udesc{font-size:10px;color:#887744;line-height:1.4}

/* ── HUD ── */
#hud{position:fixed;bottom:0;left:0;right:0;height:60px;background:linear-gradient(to top,rgba(10,8,18,.95),rgba(10,8,18,.7));border-top:1px solid rgba(100,60,160,.12);display:none;align-items:center;justify-content:space-between;padding:0 16px;z-index:10;pointer-events:none}
.hud-side{display:flex;align-items:center;gap:8px;font-size:11px}
.bar-o{width:70px;height:5px;background:rgba(20,15,30,.8);border-radius:3px;overflow:hidden}
.bar-i{height:100%;border-radius:3px;transition:width .15s}
.spell-icons{display:flex;gap:3px}
.sp-icon{width:26px;height:26px;border:1px solid rgba(100,60,160,.3);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;background:rgba(15,10,25,.8);position:relative}
.sp-icon .cd-ov{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);border-radius:0 0 2px 2px}
#floor-display{position:fixed;top:8px;left:50%;transform:translateX(-50%);font-size:12px;color:#554466;z-index:10;display:none;letter-spacing:1px}
#minimap-wrap{position:fixed;top:8px;right:8px;z-index:10;display:none}
#gold-display{position:fixed;top:8px;left:8px;font-size:12px;color:#bbaa44;z-index:10;display:none}

/* ── GAME OVER ── */
#gameover{display:none;position:fixed;inset:0;z-index:100;background:rgba(5,3,10,.95);flex-direction:column;align-items:center;justify-content:center}
#gameover h2{font-size:36px;color:#cc4444;letter-spacing:3px;margin-bottom:8px}
#gameover .stats{color:#665577;font-size:13px;line-height:1.8;margin-bottom:16px;text-align:center}
</style>
</head>
<body>

<div id="lobby">
  <h1>WIZARD CRAWL</h1>
  <div class="sub">co-op roguelike dungeon crawler</div>
  <div class="lobby-box">
    <h3>HOST GAME</h3>
    <button class="btn btn-primary" onclick="hostGame()">CREATE ROOM</button>
    <div id="host-info" style="display:none">
      <div class="room-code" id="room-code"></div>
      <div class="status" id="host-status">waiting for partner...</div>
    </div>
  </div>
  <div class="lobby-box">
    <h3>JOIN GAME</h3>
    <input type="text" id="join-code" placeholder="CODE" maxlength="6">
    <button class="btn" onclick="joinGame()">CONNECT</button>
    <div class="status" id="join-status"></div>
  </div>
  <div class="lobby-box">
    <h3>SOLO RUN</h3>
    <button class="btn" onclick="startLocal()">PLAY SOLO</button>
  </div>
  <div id="error-msg"></div>
</div>

<div id="select-screen">
  <h2>CHOOSE YOUR WIZARD</h2>
  <div class="class-grid" id="class-grid"></div>
  <button class="btn btn-primary" id="btn-ready" style="margin-top:10px" onclick="confirmClass()">READY</button>
  <div class="status" id="select-status" style="margin-top:6px"></div>
</div>

<div id="upgrade-screen">
  <h2>CHOOSE AN UPGRADE</h2>
  <div class="upgrade-grid" id="upgrade-grid"></div>
</div>

<div id="hud">
  <div class="hud-side" id="hud-p1"></div>
  <div style="text-align:center;font-size:10px;color:#443355" id="hud-room"></div>
  <div class="hud-side" id="hud-p2"></div>
</div>
<div id="floor-display">FLOOR <span id="floor-num">1</span> · ROOM <span id="room-num">1</span></div>
<div id="gold-display">Gold: <span id="gold-val">0</span></div>
<div id="minimap-wrap"><canvas id="minimap" width="140" height="140"></canvas></div>

<div id="gameover">
  <h2>RUN OVER</h2>
  <div class="stats" id="go-stats"></div>
  <button class="btn btn-primary" onclick="location.reload()">TRY AGAIN</button>
</div>

<canvas id="c"></canvas>

<script>
// ═══════════════════════════════════
//          SETUP
// ═══════════════════════════════════
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const mmCanvas=document.getElementById('minimap'),mmCtx=mmCanvas.getContext('2d');
let W,H;function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
resize();addEventListener('resize',resize);

const RW=1000,RH=700; // room size
const WIZ_SZ=13,WIZ_HP=8,MAX_MANA=100,MANA_REGEN=14;
const DOOR_W=60;

// ═══════════════════════════════════
//        WIZARD CLASSES
// ═══════════════════════════════════
const CLASSES={
  pyromancer:{name:'Pyromancer',color:'#ff6633',glow:'#ff4400',

      {name:'Flame Wave',key:'RMB',type:'cone',dmg:2,range:110,mana:22,cd:2.5,angle:.8,color:'#ff4400'},
      {name:'Meteor',key:'Q',type:'aoe_delayed',dmg:4,mana:40,cd:8,delay:.8,radius:75,color:'#ff2200'},

    ]},

    desc:'Ice magic. Crowd control.',
    passive:{name:'Frostbite',desc:'Slowed enemies take +1 damage'},
    spells:[
      {name:'Ice Shard',key:'LMB',type:'projectile',dmg:1,speed:520,radius:7,mana:6,cd:.22,life:1,slow:.6,color:'#88ddff',trail:'#44aadd'},
      {name:'Frost Nova',key:'RMB',type:'nova',dmg:2,range:95,mana:22,cd:3.5,slow:1.5,color:'#44bbff'},
      {name:'Blizzard',key:'Q',type:'zone',dmg:1,mana:35,cd:10,radius:90,duration:4,tickRate:.7,slow:.8,color:'#2288dd'},
      {name:'Absolute Zero',key:'R',type:'ultimate',ultCharge:100,color:'#2288dd'},
    ]},
  stormcaller:{name:'Stormcaller',color:'#bb66ff',glow:'#9944dd',
    desc:'Lightning. Instant strikes.',
    passive:{name:'Static',desc:'Every 5th hit stuns the target for 0.5s'},
    spells:[
      {name:'Lightning',key:'LMB',type:'beam',dmg:1,range:320,mana:7,cd:.28,width:3,color:'#cc88ff',trail:'#aa55ff'},
      {name:'Ball Zap',key:'RMB',type:'projectile',dmg:1,speed:140,radius:16,mana:18,cd:3,life:3.5,zap:75,zapRate:.45,color:'#bb66ff',trail:'#9944dd'},
      {name:'Thunder',key:'Q',type:'aoe_delayed',dmg:3,mana:35,cd:8,delay:.5,radius:65,stun:1,color:'#ffcc44'},
      {name:'Storm Fury',key:'R',type:'ultimate',ultCharge:100,color:'#ffcc44'},
    ]},
  arcanist:{name:'Arcanist',color:'#ff55aa',glow:'#dd3388',
    desc:'Arcane arts. Mobility & homing.',
    passive:{name:'Arcane Echo',desc:'Spells have 20% chance to fire twice'},
    spells:[
      {name:'Arcane Bolt',key:'LMB',type:'homing',dmg:1,speed:300,radius:8,mana:7,cd:.28,life:2,homing:2.5,color:'#ff55aa',trail:'#dd3388'},
      {name:'Blink',key:'RMB',type:'blink',range:170,mana:18,cd:2.5,color:'#ff88cc'},
      {name:'Barrage',key:'Q',type:'barrage',dmg:1,speed:380,radius:7,mana:35,cd:7,count:7,spread:.4,life:1.2,color:'#ff55aa',trail:'#cc2277'},
      {name:'Arcane Storm',key:'R',type:'ultimate',ultCharge:100,color:'#ff55aa'},
    ]},
  necromancer:{name:'Necromancer',color:'#55cc55',glow:'#228822',
    desc:'Death magic. Drains life.',
    passive:{name:'Soul Harvest',desc:'Kills heal 1 HP'},
    spells:[
      {name:'Soul Bolt',key:'LMB',type:'projectile',dmg:1,speed:380,radius:9,mana:7,cd:.3,life:1.3,drain:1,color:'#55cc55',trail:'#228822'},
      {name:'Death Wave',key:'RMB',type:'nova',dmg:2,range:100,mana:24,cd:3.5,drain:2,color:'#44aa44'},
      {name:'Plague',key:'Q',type:'zone',dmg:1,mana:38,cd:9,radius:95,duration:5,tickRate:.6,slow:.4,drain:1,color:'#338833'},
      {name:'Army of Dead',key:'R',type:'ultimate',ultCharge:100,color:'#228822'},
    ]},
  chronomancer:{name:'Chronomancer',color:'#ffcc44',glow:'#cc9922',
    desc:'Time magic. Haste & slow.',
    passive:{name:'Haste Aura',desc:'+10% move speed for nearby ally'},
    spells:[
      {name:'Time Bolt',key:'LMB',type:'projectile',dmg:1,speed:480,radius:8,mana:6,cd:.25,life:1,slow:1,color:'#ffcc44',trail:'#cc9922'},
      {name:'Time Warp',key:'RMB',type:'nova',dmg:1,range:110,mana:22,cd:4,slow:2.5,stun:.5,color:'#ffdd66'},
      {name:'Rewind',key:'Q',type:'rewind',mana:45,cd:12,color:'#ffcc44'},
      {name:'Time Stop',key:'R',type:'ultimate',ultCharge:100,color:'#ffdd66'},
    ]},
  // ── NON-MAGE CLASSES ──
  knight:{name:'Knight',color:'#aabbcc',glow:'#778899',
    desc:'Tank. Absorbs damage, protects ally.',
    passive:{name:'Bulwark',desc:'Take 25% less damage'},
    spells:[
      {name:'Sword Slash',key:'LMB',type:'cone',dmg:2,range:55,mana:3,cd:.3,angle:1.2,color:'#ccddee'},
      {name:'Shield Bash',key:'RMB',type:'nova',dmg:3,range:45,mana:15,cd:2,stun:1,color:'#8899aa'},
      {name:'Charge',key:'Q',type:'blink',range:200,mana:20,cd:4,color:'#aabbcc'},
      {name:'Shield Wall',key:'R',type:'ultimate',ultCharge:100,color:'#ccddee'},
    ]},
  berserker:{name:'Berserker',color:'#ff4444',glow:'#cc2222',
    desc:'Melee DPS. The lower the HP, the stronger.',
    passive:{name:'Fury',desc:'Below 50% HP: +50% damage and speed'},
    spells:[
      {name:'Axe Swing',key:'LMB',type:'cone',dmg:3,range:50,mana:2,cd:.35,angle:1.5,color:'#ff6644'},
      {name:'Throwing Axe',key:'RMB',type:'projectile',dmg:2,speed:450,radius:8,mana:10,cd:1,life:1,color:'#ff4444',trail:'#cc2222'},
      {name:'Leap Slam',key:'Q',type:'leap',range:180,mana:20,cd:3.5,dmg:3,aoeR:60,color:'#ff3322'},
      {name:'Blood Rage',key:'R',type:'ultimate',ultCharge:100,color:'#ff2222'},
    ]},
  paladin:{name:'Paladin',color:'#ffddaa',glow:'#ccaa66',
    desc:'Support. Heals ally, smites undead.',
    passive:{name:'Aura of Light',desc:'Nearby ally regens 2 HP/s'},
    spells:[
      {name:'Smite',key:'LMB',type:'projectile',dmg:2,speed:380,radius:9,mana:7,cd:.35,life:1.2,color:'#ffddaa',trail:'#ccaa66'},
      {name:'Holy Shield',key:'RMB',type:'ally_shield',mana:25,cd:5,duration:3,color:'#ffffcc'},
      {name:'Consecrate',key:'Q',type:'zone',dmg:2,mana:30,cd:7,radius:80,duration:3,tickRate:.6,slow:.3,color:'#ffeeaa',heal:1},
      {name:'Holy Light',key:'R',type:'ultimate',ultCharge:100,color:'#ffffcc'},
    ]},
  ranger:{name:'Ranger',color:'#88cc44',glow:'#668833',
    desc:'Ranged DPS. Fast attacks, high mobility.',
    passive:{name:'Eagle Eye',desc:'Primary range +30%, crits at max range'},
    spells:[
      {name:'Arrow',key:'LMB',type:'projectile',dmg:1,speed:600,radius:5,mana:4,cd:.18,life:1.4,color:'#88cc44',trail:'#668833'},
      {name:'Volley',key:'RMB',type:'barrage',dmg:1,speed:500,radius:5,mana:18,cd:2.5,count:5,spread:.6,life:1,color:'#88cc44',trail:'#556622'},
      {name:'Trap',key:'Q',type:'trap',mana:15,cd:4,dmg:3,radius:50,slow:2,color:'#aadd55'},
      {name:'Arrow Rain',key:'R',type:'ultimate',ultCharge:100,color:'#88cc44'},
    ]},
};
const CLASS_ORDER=['pyromancer','cryomancer','stormcaller','arcanist','necromancer','chronomancer','knight','berserker','paladin','ranger'];

// ═══════════════════════════════════
//        ENEMY TYPES
// ═══════════════════════════════════
const ENEMIES={
  slime:{name:'Slime',hp:2,speed:55,size:11,color:'#44cc44',dmg:1,xp:1,gold:1,ai:'chase',atkR:20,atkCd:1},
  bat:{name:'Bat',hp:1,speed:120,size:8,color:'#8866aa',dmg:1,xp:1,gold:1,ai:'chase',atkR:16,atkCd:.7},
  skeleton:{name:'Skeleton',hp:3,speed:70,size:11,color:'#ccbb88',dmg:1,xp:2,gold:2,ai:'ranged',atkR:220,atkCd:1.4,projSpd:280,projCol:'#ddcc99'},
  wraith:{name:'Wraith',hp:3,speed:130,size:10,color:'#8855cc',dmg:2,xp:3,gold:3,ai:'chase',atkR:18,atkCd:.8,phase:true},
  golem:{name:'Golem',hp:20,speed:35,size:24,color:'#886644',dmg:3,xp:10,gold:10,ai:'chase',atkR:32,atkCd:2,boss:true},
  demon:{name:'Demon',hp:25,speed:50,size:22,color:'#cc3333',dmg:3,xp:12,gold:12,ai:'ranged',atkR:250,atkCd:1.2,projSpd:350,projCol:'#ff4422',boss:true},
  _ally:{name:'Skeleton',hp:4,speed:80,size:9,color:'#55cc55',dmg:2,xp:0,gold:0,ai:'chase',atkR:20,atkCd:.8},
};

// ═══════════════════════════════════
//           UPGRADES
// ═══════════════════════════════════
const UPGRADE_POOL=[
  // ── DAMAGE ──
  {name:'Spell Power',desc:'All spells deal +1 damage',apply:p=>{for(const s of p.cls.spells)s.dmg=(s.dmg||0)+1}},
  {name:'Primary Boost',desc:'Primary spell +2 damage',apply:p=>{p.cls.spells[0].dmg+=2}},
  {name:'Ultimate Power',desc:'Ultimate spell +3 damage',apply:p=>{if(p.cls.spells[2].dmg)p.cls.spells[2].dmg+=3}},
  {name:'Glass Cannon',desc:'+3 spell damage, -2 max HP',apply:p=>{for(const s of p.cls.spells)s.dmg=(s.dmg||0)+3;p.maxHp=Math.max(1,p.maxHp-2);p.hp=Math.min(p.hp,p.maxHp)}},
  {name:'Critical Strike',desc:'15% chance to deal 2x damage',apply:p=>{p.critChance=(p.critChance||0)+0.15}},
  {name:'Overkill',desc:'Excess kill damage chains to nearby enemy',apply:p=>{p.overkill=true}},

  // ── PROJECTILE MODIFIERS ──
  {name:'Piercing',desc:'Primary passes through +1 enemy',apply:p=>{p.pierce=(p.pierce||0)+1}},
  {name:'Split Shot',desc:'Primary fires 2 extra bolts at ±15°',apply:p=>{p.splitShot=(p.splitShot||0)+2}},
  {name:'Ricochet',desc:'Projectiles bounce off walls once',apply:p=>{p.ricochet=(p.ricochet||0)+1}},
  {name:'Velocity',desc:'Projectile speed +40%',apply:p=>{for(const s of p.cls.spells)if(s.speed)s.speed*=1.4}},
  {name:'Chain Hit',desc:'Hits jump to 1 nearby enemy for 50% dmg',apply:p=>{p.chainHit=(p.chainHit||0)+1}},
  {name:'Homing Bolts',desc:'Primary slightly tracks enemies',apply:p=>{const s=p.cls.spells[0];s.homing=(s.homing||0)+1.5}},
  {name:'Big Spells',desc:'Projectile size +30%',apply:p=>{for(const s of p.cls.spells)if(s.radius)s.radius*=1.3}},
  {name:'Blast Radius',desc:'Explosions +50% area',apply:p=>{for(const s of p.cls.spells){if(s.explode)s.explode*=1.5;if(s.radius&&s.type==='aoe_delayed')s.radius*=1.5;}}},

  // ── FIRE RATE / COOLDOWN ──
  {name:'Swift Cast',desc:'All cooldowns -20%',apply:p=>{for(const s of p.cls.spells)s.cd*=0.8}},
  {name:'Rapid Fire',desc:'Primary fires 40% faster',apply:p=>{p.cls.spells[0].cd*=0.6}},
  {name:'Double Tap',desc:'Primary fires 2 shots per cast',apply:p=>{p.doubleTap=(p.doubleTap||0)+1}},
  {name:'Trigger Happy',desc:'Kills reset primary cooldown',apply:p=>{p.killResetCD=true}},

  // ── MANA ──
  {name:'Efficiency',desc:'Mana costs -25%',apply:p=>{for(const s of p.cls.spells)s.mana*=0.75}},
  {name:'Mana Flow',desc:'Mana regen +50%',apply:p=>{p.manaRegen*=1.5}},
  {name:'Max Mana +30',desc:'Bigger mana pool',apply:p=>{p.maxMana+=30;p.mana+=30}},
  {name:'Mana on Kill',desc:'Restore 8 mana per kill',apply:p=>{p.manaOnKill=(p.manaOnKill||0)+8}},
  {name:'Spell Thief',desc:'Hits restore 2 mana',apply:p=>{p.manaOnHit=(p.manaOnHit||0)+2}},

  // ── SURVIVABILITY ──
  {name:'Vitality',desc:'Max HP +2, heal to full',apply:p=>{p.maxHp+=2;p.hp=p.maxHp}},
  {name:'Armor',desc:'Take -1 damage (min 1)',apply:p=>{p.armor=(p.armor||0)+1}},
  {name:'Vampirism',desc:'Heal 1 HP per 4 kills',apply:p=>{p.vampirism=(p.vampirism||0)+1;p.vampKillReq=4}},
  {name:'Life Steal',desc:'5% of damage dealt heals you',apply:p=>{p.lifeSteal=(p.lifeSteal||0)+0.05}},
  {name:'Second Wind',desc:'Revive once per floor with 50% HP',apply:p=>{p.secondWind=(p.secondWind||0)+1}},
  {name:'Thorns',desc:'Enemies take 1 damage when they hit you',apply:p=>{p.thorns=(p.thorns||0)+1}},
  {name:'Dodge',desc:'15% chance to avoid damage entirely',apply:p=>{p.dodgeChance=(p.dodgeChance||0)+0.15}},

  // ── MOBILITY ──
  {name:'Quick Step',desc:'Move speed +25%',apply:p=>{p.moveSpeed*=1.25}},
  {name:'Dash',desc:'Press SHIFT to dash. 2s cooldown.',apply:p=>{p.hasDash=true;p.dashCd=0}},
  {name:'Momentum',desc:'Moving increases damage by up to 20%',apply:p=>{p.momentum=true}},

function dist(x1,y1,x2,y2){return Math.sqrt((x2-x1)**2+(y2-y1)**2)}

function clamp(v,a,b){return Math.max(a,Math.min(b,v))}

function generateFloor(){
  dungeon=[];
  const size=5;
  // Create grid of rooms
  for(let y=0;y<size;y++)for(let x=0;x<size;x++){
    dungeon.push({gx:x,gy:y,type:'empty',visited:false,doors:{n:false,s:false,e:false,w:false},enemies:[],pillars:[]});
  }
  // Carve path from start to boss
  const start=dungeon[Math.floor(size/2)*size+Math.floor(size/2)]; // center
  start.type='start';start.visited=true;
  let path=[start];let current=start;
  const roomCount=6+floor*2;
  for(let i=0;i<roomCount;i++){
    const neighbors=[];
    const{gx,gy}=current;
    if(gx>0){const r=dungeon[gy*size+gx-1];if(r.type==='empty')neighbors.push({r,dir:'w',opp:'e'});}
    if(gx<size-1){const r=dungeon[gy*size+gx+1];if(r.type==='empty')neighbors.push({r,dir:'e',opp:'w'});}
    if(gy>0){const r=dungeon[(gy-1)*size+gx];if(r.type==='empty')neighbors.push({r,dir:'n',opp:'s'});}
    if(gy<size-1){const r=dungeon[(gy+1)*size+gx];if(r.type==='empty')neighbors.push({r,dir:'s',opp:'n'});}
    if(neighbors.length===0){current=path[Math.floor(Math.random()*path.length)];i--;continue;}
    const pick=neighbors[Math.floor(Math.random()*neighbors.length)];
    current.doors[pick.dir]=true;
    pick.r.doors[pick.opp]=true;
    pick.r.type=i===roomCount-1?'boss':(Math.random()<0.2?'treasure':'combat');
    path.push(pick.r);current=pick.r;
  }
  // Remove empty rooms
  dungeon=dungeon.filter(r=>r.type!=='empty');
  return start;
}

function generateRoomContent(room){
  pillars.length=0;enemies.length=0;spells.length=0;zones.length=0;aoeMarkers.length=0;eProj.length=0;pickups.length=0;
  roomCleared=false;doorsOpen=room.type==='start'||room.type==='treasure';

  // Pillars
  if(room.type==='combat'||room.type==='boss'){
    const pCount=3+Math.floor(Math.random()*3);
    for(let i=0;i<pCount;i++){
      let px,py,tries=0;
      do{px=80+Math.random()*(RW-160);py=80+Math.random()*(RH-160);tries++;}
      while(tries<20&&(dist(px,py,RW/2,RH/2)<80));
      pillars.push({x:px,y:py,radius:18+Math.random()*10});
    }
  }

  // Enemies
  if(room.type==='combat'){
    const tier=floor;
    const count=4+floor*2+roomsCleared;
    const pool=tier<=1?['slime','bat']:tier<=2?['slime','bat','skeleton']:['slime','skeleton','wraith'];
    for(let i=0;i<count;i++){
      const type=pool[Math.floor(Math.random()*pool.length)];
      const et=ENEMIES[type];
      const ex=60+Math.random()*(RW-120),ey=60+Math.random()*(RH-120);
      enemies.push({type,x:ex,y:ey,vx:0,vy:0,hp:et.hp+Math.floor(floor/3),maxHp:et.hp+Math.floor(floor/3),alive:true,atkTimer:et.atkCd*Math.random(),target:0,iframes:0,slowTimer:0,stunTimer:0});
    }
  }
  else if(room.type==='boss'){
    const bossType=floor%2===0?'demon':'golem';
    const et=ENEMIES[bossType];
    const bossHp=et.hp+floor*5;
    enemies.push({type:bossType,x:RW/2,y:RH*0.3,vx:0,vy:0,hp:bossHp,maxHp:bossHp,alive:true,atkTimer:2,target:0,iframes:0,slowTimer:0,stunTimer:0});
    // Add some minions
    for(let i=0;i<3+floor;i++){
      enemies.push({type:'slime',x:rand(100,RW-100),y:rand(100,RH-100),vx:0,vy:0,hp:2,maxHp:2,alive:true,atkTimer:Math.random()*2,target:0,iframes:0,slowTimer:0,stunTimer:0});
    }
  }
  else if(room.type==='treasure'){
    pickups.push({x:RW/2,y:RH/2,type:'chest',collected:false});
    doorsOpen=true;
  }

  // Start room: spawn a few easy enemies
  if(room.type==='start'){
    for(let i=0;i<4;i++){
      enemies.push({type:'slime',x:rand(100,RW-100),y:rand(80,RH*0.4),vx:0,vy:0,hp:2,maxHp:2,alive:true,atkTimer:Math.random()*2,target:0,iframes:0,slowTimer:0,stunTimer:0});
    }
    doorsOpen=false;roomCleared=false;
  }
}

function enterRoom(room){
  currentRoom=room;room.visited=true;
  generateRoomContent(room);
  // Position players at center
  for(const p of players){p.x=RW/2+(p.idx===0?-25:25);p.y=RH/2;p.iframes=1;}
  document.getElementById('room-num').textContent=roomsCleared+1;
}

function checkDoors(){
  if(!doorsOpen)return;
  for(const p of players){
    if(!p.alive)continue;
    // Check if player walks through a door
    if(currentRoom.doors.n&&p.y<15&&Math.abs(p.x-RW/2)<DOOR_W){goThroughDoor('n');return;}
    if(currentRoom.doors.s&&p.y>RH-15&&Math.abs(p.x-RW/2)<DOOR_W){goThroughDoor('s');return;}
    if(currentRoom.doors.w&&p.x<15&&Math.abs(p.y-RH/2)<DOOR_W){goThroughDoor('w');return;}
    if(currentRoom.doors.e&&p.x>RW-15&&Math.abs(p.y-RH/2)<DOOR_W){goThroughDoor('e');return;}
  }
}

function goThroughDoor(dir){
  const{gx,gy}=currentRoom;
  let nx=gx,ny=gy;
  if(dir==='n')ny--;if(dir==='s')ny++;if(dir==='w')nx--;if(dir==='e')nx++;
  const nextRoom=dungeon.find(r=>r.gx===nx&&r.gy===ny);
  if(!nextRoom)return;

  roomsCleared++;sfx('door');

  // If just cleared a combat room, show upgrade
  if(currentRoom.type==='combat'||currentRoom.type==='boss'||currentRoom.type==='start'){
    showUpgradeScreen(nextRoom);
    return;
  }
  enterRoom(nextRoom);
}

// ═══════════════════════════════════
let pendingUpgradeChoices=null; // indices into UPGRADE_POOL
let upgradePickedLocal=false;
let upgradePickedRemote=false;
let pendingNextRoom=null;

function showUpgradeScreen(nextRoom){
  gamePhase='upgrade';
  document.body.classList.remove('in-game');
  upgradePickedLocal=false;
  upgradePickedRemote=false;
  pendingNextRoom=nextRoom;

  // Pick 3 random upgrade indices
  const indices=[];
  const available=[...Array(UPGRADE_POOL.length).keys()];
  for(let i=0;i<3&&available.length>0;i++){
    const pick=Math.floor(Math.random()*available.length);
    indices.push(available.splice(pick,1)[0]);
  }
  pendingUpgradeChoices=indices;

  // Send choices to guest
  if(mode==='host'&&conn&&conn.open){
    try{conn.send({type:'upgrade',indices});}catch(e){}
  }

  showUpgradeUI(indices);
}

function showUpgradeFromHost(indices){
  // Guest receives upgrade choices from host
  gamePhase='upgrade';
  document.body.classList.remove('in-game');
  upgradePickedLocal=false;
  pendingUpgradeChoices=indices;
  showUpgradeUI(indices);
}

function showUpgradeUI(indices){
  const screen=document.getElementById('upgrade-screen');
  const grid=document.getElementById('upgrade-grid');
  screen.style.display='flex';
  grid.innerHTML='';

  for(const idx of indices){
    const up=UPGRADE_POOL[idx];
    const card=document.createElement('div');
    card.className='upgrade-card';
    card.innerHTML=`<div class="uname">${up.name}</div><div class="udesc">${up.desc}</div>`;
    card.onclick=()=>{
      if(upgradePickedLocal)return;
      upgradePickedLocal=true;
      // Apply to local player only
      const myPlayer=players[localIdx];
      if(myPlayer)up.apply(myPlayer);
      sfx('pickup');
      card.style.borderColor='#44cc44';

      // Tell the other side
      if(mode==='host'&&conn&&conn.open){
        try{conn.send({type:'host_picked',idx});}catch(e){}
        checkBothPicked();
      } else if(mode==='guest'&&conn&&conn.open){
        try{conn.send({type:'guest_picked',idx});}catch(e){}
        // Guest waits for host to resume
        grid.innerHTML='<div style="color:#554466;padding:20px">Waiting for host...</div>';
      } else {
        // Local/solo — just continue
        finishUpgrade();
      }
    };
    grid.appendChild(card);
  }
}

function checkBothPicked(){
  if(upgradePickedLocal&&upgradePickedRemote){
    finishUpgrade();
  } else if(upgradePickedLocal){
    const grid=document.getElementById('upgrade-grid');
    grid.innerHTML='<div style="color:#554466;padding:20px">Waiting for partner...</div>';
  }
}

function finishUpgrade(){
  document.getElementById('upgrade-screen').style.display='none';
  document.body.classList.add('in-game');
  gamePhase='playing';
  if(mode!=='guest'&&pendingNextRoom){
    enterRoom(pendingNextRoom);
    pendingNextRoom=null;
  }
  // Tell guest to resume
  if(mode==='host'&&conn&&conn.open){
    try{conn.send({type:'resume'});}catch(e){}
  }
}

function getInput(pIdx){
  const p=players[pIdx];if(!p)return{angle:0,thrust:0,strafe:0,shoot:false,shoot2:false,ability:false};
  if(pIdx!==localIdx&&mode!=='local')return remoteInput;
  const wp=toWorld(mouseX,mouseY);
  return{
    angle:Math.atan2(wp.y-p.y,wp.x-p.x),
    mx:keys.KeyA?-1:(keys.KeyD?1:0),
    my:keys.KeyW?-1:(keys.KeyS?1:0),
    shoot:mouseDown,shoot2:rightDown,ability:!!keys.KeyQ,ult:!!keys.KeyR,
  };
}

// ═══════════════════════════════════
//       PLAYER UPDATE
// ═══════════════════════════════════
function updatePlayers(dt){
  for(const p of players){
    if(!p.alive)continue;
    const input=getInput(p.idx);
    if(p.stunTimer>0){p.stunTimer-=dt;continue;}
    const slow=p.slowTimer>0?0.5:1;if(p.slowTimer>0)p.slowTimer-=dt;

    // Aim follows mouse instantly
    if(!isNaN(input.angle))p.angle=input.angle;

    // Absolute movement: W=up S=down A=left D=right
    const ms=p.moveSpeed*slow;
    let mvx=(input.mx||0)*ms, mvy=(input.my||0)*ms;
    // Normalize diagonal
    const mvLen=Math.sqrt(mvx*mvx+mvy*mvy);
    if(mvLen>ms){mvx*=ms/mvLen;mvy*=ms/mvLen;}
    p.vx=mvx;p.vy=mvy;
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    p.x=clamp(p.x,WIZ_SZ,RW-WIZ_SZ);p.y=clamp(p.y,WIZ_SZ,RH-WIZ_SZ);

    for(const pl of pillars){const d=dist(p.x,p.y,pl.x,pl.y);if(d<pl.radius+WIZ_SZ){const nx=(p.x-pl.x)/d,ny=(p.y-pl.y)/d;p.x=pl.x+nx*(pl.radius+WIZ_SZ+1);p.y=pl.y+ny*(pl.radius+WIZ_SZ+1);}}

    p.mana=Math.min(p.maxMana,p.mana+p.manaRegen*dt);
    for(let i=0;i<4;i++)if(p.cd[i]>0)p.cd[i]-=dt;
    if(p.iframes>0)p.iframes-=dt;
    // Rewind snapshot (save every 3s)
    p._snapTimer=(p._snapTimer||0)+dt;
    if(p._snapTimer>=3){p._snapTimer=0;p._rewindSnap={hp:p.hp,mana:p.mana};}

    const sd=p.cls.spells;
    if(input.shoot&&p.cd[0]<=0&&p.mana>=sd[0].mana){
      castSpell(p,0,input.angle);
      // Split shot: extra bolts at angles
      if(p.splitShot){for(let ss=1;ss<=p.splitShot;ss++){const off=(Math.ceil(ss/2))*0.26*(ss%2===0?1:-1);castSpellSilent(p,0,input.angle+off);}}
      // Double tap: fire again after short delay
      if(p.doubleTap){for(let dt2=0;dt2<p.doubleTap;dt2++)setTimeout(()=>castSpellSilent(p,0,input.angle),60*(dt2+1));}
    }
    if(input.shoot2&&p.cd[1]<=0&&p.mana>=sd[1].mana)castSpell(p,1,input.angle);
    if(input.ability&&p.cd[2]<=0&&p.mana>=sd[2].mana&&!keys[`_q${p.idx}`]){keys[`_q${p.idx}`]=true;castSpell(p,2,input.angle);}
    if(!input.ability)keys[`_q${p.idx}`]=false;
    // Ultimate (R) — needs full charge
    if(input.ult&&p.ultCharge>=100&&!keys[`_r${p.idx}`]){keys[`_r${p.idx}`]=true;castUltimate(p,input.angle);}
    if(!input.ult)keys[`_r${p.idx}`]=false;

    // ── PASSIVES ──
    // Chronomancer: haste aura for ally
    if(p.clsKey==='chronomancer'){const ally=players[1-p.idx];if(ally&&ally.alive&&dist(p.x,p.y,ally.x,ally.y)<150)ally._hasteBonus=true;else if(ally)ally._hasteBonus=false;}
    if(p._hasteBonus)p.moveSpeed=Math.max(p.moveSpeed,190*1.1);
    // Berserker: fury below 50% HP
    if(p.clsKey==='berserker'&&p.hp<=p.maxHp/2){p._furyActive=true;}else{p._furyActive=false;}
    // Paladin: aura of light — heal nearby ally 2 HP/s
    if(p.clsKey==='paladin'){const ally=players[1-p.idx];if(ally&&ally.alive&&dist(p.x,p.y,ally.x,ally.y)<120){
      p._auraTick=(p._auraTick||0)+dt;if(p._auraTick>=.5){p._auraTick=0;if(ally.hp<ally.maxHp){ally.hp=Math.min(ally.maxHp,ally.hp+1);spawnText(ally.x,ally.y-20,'+1','#ffffaa');}}}}
    // Time stop decay
    if(p._timeStopTimer>0){p._timeStopTimer-=dt;if(p._timeStopTimer<=0)p.moveSpeed=190;}
    // Blood rage decay
    if(p._rage>0){p._rage-=dt;if(p._rage<=0)p._rageDmgMul=1;}
    // Shield wall decay
    if(p._shieldWall>0){p._shieldWall-=dt;}
    // Holy shield decay
    if(p._holyShield>0){p._holyShield-=dt;}

    // Dash (SHIFT)
    if(p.hasDash){
      if(p.dashCd>0)p.dashCd-=dt;
      const dashKey=p.idx===localIdx?(keys.ShiftLeft||keys.ShiftRight):input.dash;
      if(dashKey&&p.dashCd<=0&&!keys[`_dash${p.idx}`]){
        keys[`_dash${p.idx}`]=true;p.dashCd=2;
        const dx=input.mx||0,dy=input.my||0;
        const dLen=Math.sqrt(dx*dx+dy*dy)||1;
        p.x+=dx/dLen*120;p.y+=dy/dLen*120;
        p.x=clamp(p.x,WIZ_SZ,RW-WIZ_SZ);p.y=clamp(p.y,WIZ_SZ,RH-WIZ_SZ);
        p.iframes=Math.max(p.iframes,0.2);sfx('blink');spawnP(p.x,p.y,p.cls.color,10);
      }
      if(!dashKey)keys[`_dash${p.idx}`]=false;
    }

    // Pickup collection
    for(const pk of pickups){
      if(pk.collected)continue;
      if(dist(p.x,p.y,pk.x,pk.y)<WIZ_SZ+15){
        pk.collected=true;sfx('pickup');
        if(pk.type==='chest'){showUpgradeScreen();}
        else if(pk.type==='health'){p.hp=Math.min(p.maxHp,p.hp+2);spawnText(pk.x,pk.y-15,'+2 HP','#44ff88');}
        else if(pk.type==='gold'){gold+=pk.value;spawnText(pk.x,pk.y-15,`+${pk.value}g`,'#ddcc44');}
      }
    }
  }
}

  spawnP(p.x,p.y,p.cls.color,30,1.5);spawnSW(p.x,p.y,120,p.cls.color);
  spawnText(p.x,p.y-35,'ULTIMATE!',p.cls.color);

    }
  } else if(p.clsKey==='cryomancer'){

      setTimeout(()=>{
        const target=alive[Math.floor(Math.random()*alive.length)];
        if(target&&target.alive){
          beams.push({x:target.x+rand(-20,20),y:-10,angle:Math.PI/2,range:target.y+20,width:4,color:'#ffcc44',life:.2});

        }
      },i*100);
    }
  } else if(p.clsKey==='arcanist'){
    // Arcane Storm: spiral of 20 homing missiles
    for(let i=0;i<20;i++){
      const sa=p.angle+(i/20)*Math.PI*4;
      setTimeout(()=>{
        spells.push({type:'homing',dmg:2,speed:250,radius:6,life:2.5,homing:3,color:'#ff55aa',trail:'#dd3388',
          x:p.x+Math.cos(sa)*20,y:p.y+Math.sin(sa)*20,

        sfx('arcane');
      },i*50);
    }
  } else if(p.clsKey==='necromancer'){

        atkTimer:0,target:-1,iframes:0,slowTimer:0,stunTimer:0,
        _friendly:true,_owner:p.idx,_lifespan:8});
      spawnP(sx,sy,'#55cc55',8);
    }
  } else if(p.clsKey==='chronomancer'){
    // Time Stop: freeze all enemies for 4s, player moves at 2x speed
    for(const e of enemies){if(!e.alive)continue;e.stunTimer=(e.stunTimer||0)+4;}
    p.moveSpeed*=2;p._timeStopTimer=4;

  } else if(p.clsKey==='knight'){

    p.iframes=3;p._shieldWall=3;

  } else if(p.clsKey==='berserker'){

    spawnP(p.x,p.y,'#ff3333',25,1.2);
  } else if(p.clsKey==='paladin'){

    for(const pl of players){if(pl.alive){pl.hp=pl.maxHp;spawnP(pl.x,pl.y,'#ffffaa',15);spawnText(pl.x,pl.y-20,'FULL HEAL','#ffffaa');}}
    for(const e of enemies){if(!e.alive)continue;damageEnemy(e,3,p.idx);}

function castSpellSilent(p,idx,angle){

    const cos=Math.cos(angle),sin=Math.sin(angle);

    spells.push({...def,x:sx,y:sy,vx:cos*def.speed,vy:sin*def.speed,owner:p.idx,age:0,zapTimer:0,pierceLeft:p.pierce||0});

function castSpell(p,idx,angle){
  const def=p.cls.spells[idx];p.mana-=def.mana;p.cd[idx]=def.cd;
  const cos=Math.cos(angle),sin=Math.sin(angle);
  const sx=p.x+cos*WIZ_SZ*1.5,sy=p.y+sin*WIZ_SZ*1.5;
  const sType=p.clsKey==='pyromancer'?'fire':p.clsKey==='cryomancer'?'ice':p.clsKey==='stormcaller'?'zap':'arcane';

  if(def.type==='projectile'||def.type==='homing'){
    spells.push({...def,x:sx,y:sy,vx:cos*def.speed,vy:sin*def.speed,owner:p.idx,age:0,zapTimer:0,pierceLeft:p.pierce||0});
    sfx(sType);
  }
  else if(def.type==='beam'){
    beams.push({x:p.x,y:p.y,angle,range:def.range,width:def.width,color:def.color,life:.15});
    for(let d=0;d<def.range;d+=5){
      const bx=p.x+cos*d,by=p.y+sin*d;
      let blocked=false;for(const pl of pillars)if(dist(bx,by,pl.x,pl.y)<pl.radius){blocked=true;break;}
      if(blocked)break;
      for(const e of enemies){if(!e.alive||e.iframes>0)continue;if(dist(bx,by,e.x,e.y)<ENEMIES[e.type].size+4){damageEnemy(e,def.dmg,p.idx);break;}}
    }
    sfx('zap');
  }
  else if(def.type==='cone'){
    for(let a=-def.angle/2;a<=def.angle/2;a+=.15)for(let d=30;d<def.range;d+=20)spawnP(p.x+Math.cos(angle+a)*d,p.y+Math.sin(angle+a)*d,def.color,1,.4);
    for(const e of enemies){if(!e.alive)continue;const d=dist(p.x,p.y,e.x,e.y);if(d>def.range)continue;const a2=Math.atan2(e.y-p.y,e.x-p.x);if(Math.abs(wrapAngle(a2-angle))<=def.angle/2)damageEnemy(e,def.dmg,p.idx);}
    sfx('fire');shake(4);
  }
  else if(def.type==='nova'){
    spawnSW(p.x,p.y,def.range,def.color);spawnP(p.x,p.y,def.color,20);
    let novaHealed=0;for(const e of enemies){if(!e.alive)continue;if(dist(p.x,p.y,e.x,e.y)<=def.range){damageEnemy(e,def.dmg,p.idx);if(def.slow)e.slowTimer=(e.slowTimer||0)+def.slow;if(def.stun)e.stunTimer=(e.stunTimer||0)+def.stun;if(def.drain)novaHealed+=def.drain;}}
    if(novaHealed>0){p.hp=Math.min(p.maxHp,p.hp+novaHealed);spawnText(p.x,p.y-20,`+${novaHealed} HP`,'#44ff88');}
    sfx('ice');shake(5);
  }
  else if(def.type==='aoe_delayed'){const wp=toWorld(mouseX,mouseY);aoeMarkers.push({x:wp.x,y:wp.y,radius:def.radius,delay:def.delay,dmg:def.dmg,color:def.color,owner:p.idx,stun:def.stun||0,age:0});sfx('arcane');}
  else if(def.type==='blink'){const nx=clamp(p.x+cos*def.range,WIZ_SZ,RW-WIZ_SZ),ny=clamp(p.y+sin*def.range,WIZ_SZ,RH-WIZ_SZ);spawnP(p.x,p.y,def.color,12);p.x=nx;p.y=ny;spawnP(p.x,p.y,def.color,12);p.iframes=.3;sfx('blink');}
  else if(def.type==='barrage'){for(let i=0;i<def.count;i++){const sa=angle+(i-def.count/2)*def.spread/def.count+rand(-.05,.05);setTimeout(()=>{spells.push({...def,type:'projectile',x:p.x+Math.cos(sa)*WIZ_SZ,y:p.y+Math.sin(sa)*WIZ_SZ,vx:Math.cos(sa)*def.speed,vy:Math.sin(sa)*def.speed,owner:p.idx,age:0,pierceLeft:0});sfx('arcane');},i*60);}}
  else if(def.type==='zone'){const wp=toWorld(mouseX,mouseY);zones.push({x:wp.x,y:wp.y,radius:def.radius,duration:def.duration,dmg:def.dmg,color:def.color,owner:p.idx,slow:def.slow||0,tickRate:def.tickRate,tickTimer:0,age:0});sfx('ice');}
  else if(def.type==='rewind'){
    // Restore to saved snapshot
    const snap=p._rewindSnap;
    if(snap){p.hp=Math.min(p.maxHp,Math.max(p.hp,snap.hp));p.mana=Math.min(p.maxMana,Math.max(p.mana,snap.mana));
      spawnP(p.x,p.y,'#ffcc44',20);spawnSW(p.x,p.y,60,'rgba(255,200,60,.4)');spawnText(p.x,p.y-25,'REWIND','#ffcc44');sfx('blink');shake(3);screenFlash=.15;}
    else{spawnText(p.x,p.y-20,'NO SNAPSHOT','#886644');p.mana+=def.mana;p.cd[2]=0;} // refund if no snap
  }
  else if(def.type==='leap'){
    // Berserker leap slam
    const cos=Math.cos(angle),sin=Math.sin(angle);
    const nx=clamp(p.x+cos*def.range,WIZ_SZ,RW-WIZ_SZ),ny=clamp(p.y+sin*def.range,WIZ_SZ,RH-WIZ_SZ);
    spawnP(p.x,p.y,def.color,8);p.x=nx;p.y=ny;p.iframes=.3;
    // AoE damage on landing
    spawnSW(p.x,p.y,def.aoeR,def.color);spawnP(p.x,p.y,def.color,15,1);sfx('boom');shake(6);
    for(const e of enemies){if(!e.alive)continue;if(dist(p.x,p.y,e.x,e.y)<def.aoeR+ENEMIES[e.type].size){damageEnemy(e,def.dmg,p.idx);}}
  }
  else if(def.type==='ally_shield'){
    // Paladin: shield ally (or self if solo)
    const ally=players[1-p.idx];
    const target=(ally&&ally.alive)?ally:p;
    target.iframes=Math.max(target.iframes,def.duration);target._holyShield=def.duration;
    spawnP(target.x,target.y,'#ffffcc',15);spawnSW(target.x,target.y,40,'rgba(255,255,200,.4)');sfx('pickup');
    spawnText(target.x,target.y-20,'SHIELDED','#ffffcc');
  }
  else if(def.type==='trap'){
    // Ranger trap: place at mouse position
    const wp=toWorld(mouseX,mouseY);
    pickups.push({x:wp.x,y:wp.y,type:'trap',collected:false,_owner:p.idx,_dmg:def.dmg,_radius:def.radius,_slow:def.slow||0,_color:def.color});
    sfx('hit');
  }
}

// ═══════════════════════════════════
//       DAMAGE
// ═══════════════════════════════════
function damageEnemy(e,rawDmg,pIdx){
  if(e.iframes>0)return;
  const p=players[pIdx];
  let dmg=rawDmg;

  // Chaos damage: random 1-4
  if(p&&p.chaosDmg)dmg=1+Math.floor(Math.random()*4);
  // Berserker fury: +50% dmg below half HP
  if(p&&p._furyActive)dmg=Math.ceil(dmg*1.5);
  // Blood rage: 2x damage
  if(p&&p._rageDmgMul>1)dmg=Math.ceil(dmg*p._rageDmgMul);
  // Critical strike
  if(p&&p.critChance&&Math.random()<p.critChance){dmg*=2;spawnText(e.x,e.y-25,'CRIT!','#ffcc44');}
  // Momentum bonus
  if(p&&p.momentum){const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);dmg=Math.round(dmg*(1+Math.min(0.2,spd/1000)));}

  e.hp-=dmg;e.iframes=.1;spawnP(e.x,e.y,'#ff6644',5,.5);sfx('hit');

  // Ultimate charge (+5 per hit, +15 per kill)
  if(p){p.ultCharge=Math.min(100,(p.ultCharge||0)+5);if(p.ultCharge>=100)p.ultReady=true;}
  // Passive: Stormcaller static (every 5th hit stuns)
  if(p&&p.clsKey==='stormcaller'){p.hitCounter=(p.hitCounter||0)+1;if(p.hitCounter%5===0){e.stunTimer=(e.stunTimer||0)+.5;spawnText(e.x,e.y-15,'STUN','#ffcc44');}}
  // Passive: Cryomancer frostbite (+1 dmg if slowed)
  if(p&&p.clsKey==='cryomancer'&&e.slowTimer>0){e.hp-=1;spawnText(e.x,e.y-15,'+1','#88ddff');}
  // Passive: Arcanist echo (20% chance double cast)
  if(p&&p.clsKey==='arcanist'&&Math.random()<0.2){castSpellSilent(p,0,Math.atan2(e.y-p.y,e.x-p.x));}
  // Passive: burn DOT
  if(p&&p.clsKey==='pyromancer'){e._burnTimer=(e._burnTimer||0)+2;e._burnOwner=p.idx;}
  // Mana on hit
  if(p&&p.manaOnHit){p.mana=Math.min(p.maxMana,p.mana+p.manaOnHit);}
  // Life steal
  if(p&&p.lifeSteal){const heal=Math.floor(dmg*p.lifeSteal);if(heal>0){p.hp=Math.min(p.maxHp,p.hp+heal);}}

  if(e.hp<=0){
    e.alive=false;totalKills++;
    const et=ENEMIES[e.type];
    const goldDrop=et.gold*(p&&p.goldMul||1);
    gold+=goldDrop;

    if(p){
      p.killCount++;
      // Ultimate charge on kill
      p.ultCharge=Math.min(100,(p.ultCharge||0)+15);if(p.ultCharge>=100)p.ultReady=true;
      // Passive: Necro soul harvest
      if(p.clsKey==='necromancer'){p.hp=Math.min(p.maxHp,p.hp+1);spawnText(p.x,p.y-15,'+1 HP','#44ff88');}
      // Vampirism
      if(p.vampirism&&p.killCount%(p.vampKillReq||5)===0){p.hp=Math.min(p.maxHp,p.hp+1);spawnText(p.x,p.y-20,'+1 HP','#44ff88');}
      // Mana on kill
      if(p.manaOnKill){p.mana=Math.min(p.maxMana,p.mana+p.manaOnKill);}
      // Kill resets primary CD
      if(p.killResetCD)p.cd[0]=0;
    }

    spawnP(e.x,e.y,et.color,18,1);spawnSW(e.x,e.y,25);sfx('kill');
    if(et.boss){shake(10);spawnText(e.x,e.y-20,'BOSS SLAIN!','#ffcc44');screenFlash=.2;}

    // Chain hit: damage jumps to nearby enemy
    if(p&&p.chainHit){
      let nearest=null,nd=Infinity;
      for(const e2 of enemies){if(!e2.alive||e2===e)continue;const d=dist(e.x,e.y,e2.x,e2.y);if(d<120&&d<nd){nd=d;nearest=e2;}}
      if(nearest){damageEnemy(nearest,Math.max(1,Math.floor(dmg*0.5)),pIdx);
        beams.push({x:e.x,y:e.y,angle:Math.atan2(nearest.y-e.y,nearest.x-e.x),range:nd,width:2,color:p.cls.color,life:.12});}
    }

    // Overkill: excess damage chains
    if(p&&p.overkill&&e.hp<0){
      const excess=Math.abs(e.hp);let nearest2=null,nd2=Infinity;
      for(const e2 of enemies){if(!e2.alive||e2===e)continue;const d=dist(e.x,e.y,e2.x,e2.y);if(d<100&&d<nd2){nd2=d;nearest2=e2;}}
      if(nearest2)damageEnemy(nearest2,excess,pIdx);
    }

    // Drop health sometimes
    if(Math.random()<0.15)pickups.push({x:e.x,y:e.y,type:'health',collected:false});
    // Check room clear
    if(enemies.every(en=>!en.alive)){roomCleared=true;doorsOpen=true;sfx('door');
      spawnText(RW/2,RH/2-50,'ROOM CLEARED','#88cc88');
      if(currentRoom&&currentRoom.type==='boss'){floor++;
        const startRoom=generateFloor();enterRoom(startRoom);
        document.getElementById('floor-num').textContent=floor;
      }
    }
  }
}

function damagePlayer(p,rawDmg,attacker){
  if(p.iframes>0)return;
  // Dodge
  if(p.dodgeChance&&Math.random()<p.dodgeChance){spawnText(p.x,p.y-20,'DODGE','#88ccff');return;}
  let reducedDmg=rawDmg;
  // Knight bulwark: 25% less damage
  if(p.clsKey==='knight')reducedDmg=Math.ceil(reducedDmg*0.75);
  // Blood rage: take 2x damage
  if(p._rage>0)reducedDmg=Math.ceil(reducedDmg*2);
  const dmg=Math.max(1,reducedDmg-(p.armor||0));
  p.hp-=dmg;p.iframes=.4;shake(3);spawnP(p.x,p.y,'#ff4444',8);sfx('hit');spawnText(p.x,p.y-20,`-${dmg}`,'#ff4444');
  // Thorns
  if(p.thorns&&attacker&&attacker.alive!==undefined){
    attacker.hp-=p.thorns;spawnP(attacker.x,attacker.y,'#aa88ff',4,.3);
    if(attacker.hp<=0){attacker.alive=false;spawnP(attacker.x,attacker.y,ENEMIES[attacker.type].color,12);sfx('kill');}
  }
  if(p.hp<=0){
    // Second wind
    if(p.secondWind&&p.secondWind>0){
      p.secondWind--;p.hp=Math.floor(p.maxHp/2);p.iframes=1.5;
      spawnP(p.x,p.y,'#ffcc44',20);spawnText(p.x,p.y-25,'SECOND WIND','#ffcc44');sfx('pickup');
      return;
    }
    p.alive=false;spawnP(p.x,p.y,'#ff6633',35,1.3);spawnSW(p.x,p.y,70,'rgba(255,100,50,.5)');sfx('boom');shake(10);screenFlash=.3;
    if(players.every(pl=>!pl.alive)){
      gamePhase='gameover';
      setTimeout(()=>{
        document.getElementById('go-stats').innerHTML=`Floor ${floor} · Room ${roomsCleared+1}<br>Kills: ${totalKills}<br>Gold: ${gold}`;
        document.getElementById('gameover').style.display='flex';
      },1500);
    } else {
      setTimeout(()=>{if(gamePhase==='playing'&&players.some(pl=>pl.alive)){p.hp=Math.floor(p.maxHp/2);p.mana=p.maxMana;p.alive=true;p.iframes=2;p.x=RW/2;p.y=RH/2;}},3000);
    }
  }
}

// ═══════════════════════════════════
//       SPELL UPDATE
// ═══════════════════════════════════
function updateSpells(dt){
  for(let i=spells.length-1;i>=0;i--){
    const s=spells[i];
    if(s.homing){let nt=null,nd=Infinity;for(const e of enemies){if(!e.alive)continue;const d=dist(s.x,s.y,e.x,e.y);if(d<nd){nd=d;nt=e;}}
    if(nt&&nd<280){const da=Math.atan2(nt.y-s.y,nt.x-s.x),ca=Math.atan2(s.vy,s.vx);let df=wrapAngle(da-ca);df=clamp(df,-s.homing*dt,s.homing*dt);const na=ca+df,sp=Math.sqrt(s.vx*s.vx+s.vy*s.vy);s.vx=Math.cos(na)*sp;s.vy=Math.sin(na)*sp;}}
    s.x+=s.vx*dt;s.y+=s.vy*dt;s.age+=dt;
    if(s.trail&&Math.random()>.3)trails.push({x:s.x+rand(-3,3),y:s.y+rand(-3,3),life:1,r:s.radius*.5,color:s.trail});
    if(s.zap){s.zapTimer-=dt;if(s.zapTimer<=0){s.zapTimer=s.zapRate;for(const e of enemies){if(!e.alive)continue;if(dist(s.x,s.y,e.x,e.y)<s.zap){beams.push({x:s.x,y:s.y,angle:Math.atan2(e.y-s.y,e.x-s.x),range:dist(s.x,s.y,e.x,e.y),width:2,color:'#bb88ff',life:.1});damageEnemy(e,s.dmg,s.owner);break;}}}}
    let hitP=false;for(const pl of pillars){if(dist(s.x,s.y,pl.x,pl.y)<pl.radius+s.radius){hitP=true;break;}}
    let hitE=false;for(const e of enemies){if(!e.alive||e.iframes>0)continue;if(dist(s.x,s.y,e.x,e.y)<ENEMIES[e.type].size+s.radius){damageEnemy(e,s.dmg,s.owner);if(s.slow)e.slowTimer=(e.slowTimer||0)+s.slow;if(s.drain){const p=players[s.owner];if(p){p.hp=Math.min(p.maxHp,p.hp+s.drain);spawnText(p.x,p.y-20,`+${s.drain}`,'#44ff88');}}if(s.pierceLeft>0){s.pierceLeft--;continue;}hitE=true;break;}}
    if(hitP||hitE||s.age>s.life||s.x<-30||s.x>RW+30||s.y<-30||s.y>RH+30){
      if((hitP||hitE)&&s.explode){spawnP(s.x,s.y,s.color,15,.8);spawnSW(s.x,s.y,s.explode,s.color);sfx('boom');shake(3);for(const e of enemies){if(!e.alive)continue;if(dist(s.x,s.y,e.x,e.y)<s.explode)damageEnemy(e,1,s.owner);}}
      else if(hitP||hitE)spawnP(s.x,s.y,s.color,4,.3);
      spells.splice(i,1);
    }
  }
}

function updateAoe(dt){for(let i=aoeMarkers.length-1;i>=0;i--){const m=aoeMarkers[i];m.age+=dt;if(m.age>=m.delay){spawnP(m.x,m.y,m.color,25,1);spawnSW(m.x,m.y,m.radius,m.color);sfx('boom');shake(6);screenFlash=.1;for(const e of enemies){if(!e.alive)continue;if(dist(m.x,m.y,e.x,e.y)<m.radius+ENEMIES[e.type].size){damageEnemy(e,m.dmg,m.owner);if(m.stun)e.stunTimer=(e.stunTimer||0)+m.stun;}}aoeMarkers.splice(i,1);}}}
function updateZones(dt){for(let i=zones.length-1;i>=0;i--){const z=zones[i];z.age+=dt;z.tickTimer-=dt;if(z.tickTimer<=0){z.tickTimer=z.tickRate;let zHealed=0;for(const e of enemies){if(!e.alive)continue;if(dist(z.x,z.y,e.x,e.y)<z.radius+ENEMIES[e.type].size){damageEnemy(e,z.dmg,z.owner);if(z.slow)e.slowTimer=(e.slowTimer||0)+z.slow;if(z.drain)zHealed+=z.drain;}}if(zHealed>0){const p=players[z.owner];if(p){p.hp=Math.min(p.maxHp,p.hp+zHealed);spawnText(p.x,p.y-20,`+${zHealed}`,'#44ff88');}}}if(z.age>=z.duration)zones.splice(i,1);}}

//       ENEMY AI
// ═══════════════════════════════════
function updateEnemies(dt){
  for(const e of enemies){
    if(!e.alive)continue;
    // Friendly summons (necro ult)
    if(e._friendly){e._lifespan-=dt;if(e._lifespan<=0){e.alive=false;spawnP(e.x,e.y,'#55cc55',6);continue;}
      // Chase nearest non-friendly enemy
      let nt=null,nd=Infinity;for(const e2 of enemies){if(!e2.alive||e2._friendly||e2===e)continue;const d=dist(e.x,e.y,e2.x,e2.y);if(d<nd){nd=d;nt=e2;}}
      if(nt){const dx=nt.x-e.x,dy=nt.y-e.y,dd=Math.max(1,Math.sqrt(dx*dx+dy*dy));e.x+=(dx/dd)*80*dt;e.y+=(dy/dd)*80*dt;
        e.atkTimer-=dt;if(e.atkTimer<=0&&dd<25){e.atkTimer=.8;damageEnemy(nt,2,e._owner);}}
      continue;
    }
    const et=ENEMIES[e.type];
    if(e.iframes>0)e.iframes-=dt;if(e.slowTimer>0)e.slowTimer-=dt;if(e.stunTimer>0){e.stunTimer-=dt;continue;}
    // Burn DOT
    if(e._burnTimer>0){e._burnTimer-=dt;e._burnTick=(e._burnTick||0)-dt;if(e._burnTick<=0){e._burnTick=.5;damageEnemy(e,1,e._burnOwner||0);}}
    const slow=e.slowTimer>0?.4:1;
    let target=players[e.target];if(!target||!target.alive){target=players.find(p=>p.alive);if(!target)continue;e.target=target.idx;}
    if(Math.random()<dt*.5){const o=players[1-e.target];if(o&&o.alive&&dist(e.x,e.y,o.x,o.y)<dist(e.x,e.y,target.x,target.y)*.7){e.target=o.idx;target=o;}}
    const dx=target.x-e.x,dy=target.y-e.y,d=Math.max(1,Math.sqrt(dx*dx+dy*dy));
    if(et.ai==='chase'){if(d>et.atkR*.8){e.vx=(dx/d)*et.speed*slow;e.vy=(dy/d)*et.speed*slow;}else{e.vx*=.8;e.vy*=.8;}}
    else if(et.ai==='ranged'){if(d>et.atkR*.6){e.vx=(dx/d)*et.speed*slow;e.vy=(dy/d)*et.speed*slow;}else if(d<et.atkR*.3){e.vx=-(dx/d)*et.speed*slow*.5;e.vy=-(dy/d)*et.speed*slow*.5;}else{e.vx*=.9;e.vy*=.9;}}
    e.x+=e.vx*dt;e.y+=e.vy*dt;
    e.x=clamp(e.x,et.size,RW-et.size);e.y=clamp(e.y,et.size,RH-et.size);
    if(!et.phase)for(const pl of pillars){const pd=dist(e.x,e.y,pl.x,pl.y);if(pd<pl.radius+et.size){const nx=(e.x-pl.x)/pd,ny=(e.y-pl.y)/pd;e.x=pl.x+nx*(pl.radius+et.size+1);e.y=pl.y+ny*(pl.radius+et.size+1);}}
    e.atkTimer-=dt;
    if(e.atkTimer<=0&&d<et.atkR){e.atkTimer=et.atkCd;
      if(et.ai==='chase'){if(target.iframes<=0)damagePlayer(target,et.dmg,e);}
      else if(et.projSpd){const a=Math.atan2(dy,dx);eProj.push({x:e.x,y:e.y,vx:Math.cos(a)*et.projSpd,vy:Math.sin(a)*et.projSpd,dmg:et.dmg,life:2,radius:5,color:et.projCol||'#cc8866'});}}
    // Trap check (ranger)
    for(const pk of pickups){if(pk.collected||pk.type!=='trap')continue;if(dist(e.x,e.y,pk.x,pk.y)<pk._radius){
      pk.collected=true;damageEnemy(e,pk._dmg,pk._owner);if(pk._slow)e.slowTimer=(e.slowTimer||0)+pk._slow;
      spawnP(pk.x,pk.y,pk._color,15);spawnSW(pk.x,pk.y,pk._radius,pk._color);sfx('boom');shake(3);break;}}
  }
}

function updateEProj(dt){
  for(let i=eProj.length-1;i>=0;i--){
    const p=eProj[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;
    if(Math.random()>.5)trails.push({x:p.x,y:p.y,life:.5,r:2,color:p.color});
    let hit=false;
    for(const pl of players){if(!pl.alive||pl.iframes>0)continue;if(dist(p.x,p.y,pl.x,pl.y)<WIZ_SZ+p.radius){damagePlayer(pl,p.dmg);hit=true;break;}}
    for(const pl2 of pillars)if(dist(p.x,p.y,pl2.x,pl2.y)<pl2.radius+p.radius){hit=true;break;}
    if(hit||p.life<=0||p.x<-20||p.x>RW+20||p.y<-20||p.y>RH+20){if(hit)spawnP(p.x,p.y,p.color,3,.3);eProj.splice(i,1);}
  }
}

function updateFx(dt){
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.94;p.vy*=.94;p.life-=dt*2.2;if(p.life<=0)particles.splice(i,1);}
  for(let i=trails.length-1;i>=0;i--){trails[i].life-=dt*4;if(trails[i].life<=0)trails.splice(i,1);}
  for(let i=shockwaves.length-1;i>=0;i--){const s=shockwaves[i];s.radius+=dt*200;s.life-=dt*2.5;if(s.life<=0)shockwaves.splice(i,1);}
  for(let i=texts.length-1;i>=0;i--){const t=texts[i];t.y+=t.vy*dt;t.life-=dt;if(t.life<=0)texts.splice(i,1);}
  for(let i=beams.length-1;i>=0;i--){beams[i].life-=dt;if(beams[i].life<=0)beams.splice(i,1);}
  if(shakeI>0){shakeX=(Math.random()-.5)*shakeI*2;shakeY=(Math.random()-.5)*shakeI*2;shakeI*=.87;if(shakeI<.3){shakeI=0;shakeX=0;shakeY=0;}}
  if(screenFlash>0)screenFlash-=dt*3;
}

function updateCamera(){
  const p=players[localIdx];if(!p||!p.alive)return;
  let tx,ty;
  if(W>=RW){tx=(W-RW)/2;}else{tx=clamp(W/2-p.x,W-RW-20,20);}
  if(H>=RH+60){ty=(H-60-RH)/2;}else{ty=clamp(H/2-p.y,H-RH-60,20);}
  // Fast lerp for responsiveness, snap on first frame
  if(camX===0&&camY===0){camX=tx;camY=ty;}
  else{camX=lerp(camX,tx,.25);camY=lerp(camY,ty,.25);}
}

function drawRoom(){
  ctx.fillStyle='#0d0a14';ctx.fillRect(0,0,RW,RH);
  ctx.strokeStyle='rgba(60,40,80,.08)';ctx.lineWidth=1;
  for(let x=0;x<RW;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,RH);ctx.stroke();}
  for(let y=0;y<RH;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(RW,y);ctx.stroke();}
  // Walls
  ctx.fillStyle='#1a1428';
  ctx.fillRect(0,0,RW,8);ctx.fillRect(0,RH-8,RW,8);ctx.fillRect(0,0,8,RH);ctx.fillRect(RW-8,0,8,RH);
  // Doors
  if(currentRoom){
    const dc=doorsOpen?'#44cc44':'#663333';
    ctx.fillStyle=dc;
    if(currentRoom.doors.n){ctx.fillRect(RW/2-DOOR_W/2,0,DOOR_W,10);if(doorsOpen){ctx.fillStyle='rgba(60,200,80,.06)';ctx.fillRect(RW/2-DOOR_W/2,0,DOOR_W,30);}}

    ctx.fillStyle=dc;if(currentRoom.doors.w)ctx.fillRect(0,RH/2-DOOR_W/2,10,DOOR_W);
    ctx.fillStyle=dc;if(currentRoom.doors.e)ctx.fillRect(RW-10,RH/2-DOOR_W/2,10,DOOR_W);
  }
}

function drawEnemies(){

  for(const r of dungeon){
    const rx=ox+r.gx*cs,ry=oy+r.gy*cs;
    if(!r.visited){mmCtx.fillStyle='rgba(40,30,60,.3)';mmCtx.fillRect(rx-5,ry-4,10,8);continue;}
    let col='#335533';
    if(r.type==='start')col='#446688';if(r.type==='boss')col='#884433';if(r.type==='treasure')col='#887744';
    if(r===currentRoom)col='#88aa66';
    mmCtx.fillStyle=col;mmCtx.fillRect(rx-5,ry-4,10,8);
    // Door lines
    mmCtx.strokeStyle='rgba(100,80,140,.4)';mmCtx.lineWidth=1;
    if(r.doors.n){mmCtx.beginPath();mmCtx.moveTo(rx,ry-4);mmCtx.lineTo(rx,ry-cs+4);mmCtx.stroke();}
    if(r.doors.s){mmCtx.beginPath();mmCtx.moveTo(rx,ry+4);mmCtx.lineTo(rx,ry+cs-4);mmCtx.stroke();}
    if(r.doors.e){mmCtx.beginPath();mmCtx.moveTo(rx+5,ry);mmCtx.lineTo(rx+cs-5,ry);mmCtx.stroke();}
    if(r.doors.w){mmCtx.beginPath();mmCtx.moveTo(rx-5,ry);mmCtx.lineTo(rx-cs+5,ry);mmCtx.stroke();}
  }
}

// ═══════════════════════════════════
//       HUD
// ═══════════════════════════════════
function updateHUD(){
  const p=players[localIdx];if(!p)return;
  let spH='<div class="spell-icons">';
  for(let i=0;i<Math.min(4,p.cls.spells.length);i++){const sd=p.cls.spells[i];
    if(sd.type==='ultimate'){
      const ultOk=p.ultCharge>=100;
      spH+=`<div class="sp-icon" style="border-color:${ultOk?'#ffcc44':'rgba(60,40,80,.3)'}"><span style="color:${ultOk?'#ffcc44':'#332244'}">R</span>${!ultOk?`<div class="cd-ov" style="height:${100-p.ultCharge}%"></div>`:''}</div>`;
    } else {
      const ok=p.cd[i]<=0&&p.mana>=sd.mana;const cdP=p.cd[i]>0?Math.round(p.cd[i]/sd.cd*100):0;
      spH+=`<div class="sp-icon" style="border-color:${ok?p.cls.color:'rgba(60,40,80,.3)'}"><span style="color:${ok?p.cls.color:'#332244'}">${sd.key}</span>${cdP>0?`<div class="cd-ov" style="height:${cdP}%"></div>`:''}</div>`;
    }
  }
  spH+='</div>';
  const fury=p._furyActive?' <span style="color:#ff4444">FURY</span>':'';
  document.getElementById('hud-p1').innerHTML=`<span style="color:${p.cls.color}">${p.cls.name}</span>${fury}
    <div><div class="bar-o"><div class="bar-i" style="width:${p.hp/p.maxHp*100}%;background:${p.hp/p.maxHp>.5?'#33cc55':'#cc3333'}"></div></div>
    <div class="bar-o" style="margin-top:2px"><div class="bar-i" style="width:${p.mana/p.maxMana*100}%;background:#4488ff"></div></div>
    <div class="bar-o" style="margin-top:1px"><div class="bar-i" style="width:${p.ultCharge}%;background:${p.ultCharge>=100?'#ffcc44':'#886633'}"></div></div></div>${spH}`;
  document.getElementById('hud-room').textContent=`F${floor} R${roomsCleared+1} · ${enemies.filter(e=>e.alive).length} enemies`;
  document.getElementById('gold-val').textContent=gold;
  const p2=players[1];
  document.getElementById('hud-p2').innerHTML=p2?`<span style="color:${p2.cls.color}">${p2.cls.name}</span><div><div class="bar-o"><div class="bar-i" style="width:${p2.hp/p2.maxHp*100}%;background:${p2.hp/p2.maxHp>.5?'#33cc55':'#cc3333'}"></div></div></div>`:'';
}

// ═══════════════════════════════════
//       NETWORKING (simplified)
// ═══════════════════════════════════
function hostGame(){initAudio();const code=Math.random().toString(36).substring(2,8).toUpperCase();document.getElementById('host-info').style.display='block';document.getElementById('room-code').textContent=code;document.getElementById('host-status').textContent='creating...';
  try{peer=new Peer('wcrawl-'+code)}catch(e){document.getElementById('error-msg').textContent='PeerJS error';return;}
  peer.on('open',()=>{document.getElementById('host-status').textContent='waiting for partner...'});
  peer.on('connection',c=>{conn=c;conn.on('open',()=>{mode='host';localIdx=0;document.getElementById('host-status').textContent='connected!';setTimeout(()=>showSelect(),400);});
  conn.on('data',msg=>{
    if(msg.type==='input')remoteInput=msg;
    if(msg.type==='cls')startWithClasses(msg.cls);
    if(msg.type==='guest_picked'){
      // Guest picked an upgrade — apply to guest's player on host side
      const up=UPGRADE_POOL[msg.idx];
      if(up&&players[1])up.apply(players[1]);
      upgradePickedRemote=true;
      checkBothPicked();
    }
  });
  conn.on('close',()=>{document.getElementById('error-msg').textContent='Partner disconnected'});});
  peer.on('error',e=>{document.getElementById('error-msg').textContent='Error: '+e.type});}

function joinGame(){initAudio();const code=document.getElementById('join-code').value.toUpperCase().trim();if(!code){document.getElementById('error-msg').textContent='Enter code';return;}
  document.getElementById('join-status').textContent='connecting...';
  try{peer=new Peer()}catch(e){document.getElementById('error-msg').textContent='PeerJS error';return;}
  peer.on('open',()=>{conn=peer.connect('wcrawl-'+code,{reliable:true});
  conn.on('open',()=>{mode='guest';localIdx=1;document.getElementById('join-status').textContent='connected!';setTimeout(()=>showSelect(),400);});
  conn.on('data',msg=>{
    if(msg.type==='state')applyState(msg);
    if(msg.type==='go')beginFromNet(msg);
    if(msg.type==='upgrade')showUpgradeFromHost(msg.indices);
    if(msg.type==='host_picked'){
      // Host picked — apply to host's player on guest side
      const up=UPGRADE_POOL[msg.idx];
      if(up&&players[0])up.apply(players[0]);
    }
    if(msg.type==='resume'){
      document.getElementById('upgrade-screen').style.display='none';
      document.body.classList.add('in-game');
      gamePhase='playing';
    }
  });
  conn.on('close',()=>{document.getElementById('error-msg').textContent='Host disconnected'});});
  peer.on('error',e=>{document.getElementById('error-msg').textContent='Error: '+e.type});}

function startLocal(){initAudio();mode='local';localIdx=0;showSelect();}

let selCls=0;
function showSelect(){document.getElementById('lobby').style.display='none';document.getElementById('select-screen').style.display='flex';buildGrid();}
function buildGrid(){const g=document.getElementById('class-grid');g.innerHTML='';CLASS_ORDER.forEach((k,i)=>{const c=CLASSES[k];const d=document.createElement('div');d.className='class-card'+(i===selCls?' selected':'');
  const spList=c.spells.map(s=>`<span style="color:${s.color||c.color}">${s.key}</span> ${s.name}`).join(' · ');
  d.innerHTML=`<div class="cname" style="color:${c.color}">${c.name}</div><div class="cdesc">${c.desc}</div><div class="cdesc" style="margin-top:3px;color:#554466;font-size:9px">Passive: ${c.passive.desc}</div><div class="cdesc" style="font-size:9px;margin-top:2px">${spList}</div>`;
  d.onclick=()=>{selCls=i;buildGrid()};g.appendChild(d)});}

function confirmClass(){
  const cls=CLASS_ORDER[selCls];
  if(mode==='local'){beginGame(cls,cls);}
  else if(mode==='host'){window._hCls=cls;document.getElementById('select-status').textContent='Waiting for partner...';if(window._gCls){conn.send({type:'go',h:window._hCls,g:window._gCls});beginGame(window._hCls,window._gCls);}}
  else if(mode==='guest'){conn.send({type:'cls',cls});document.getElementById('select-status').textContent='Waiting for host...';}
}
function startWithClasses(gCls){if(mode==='host'){window._gCls=gCls;if(window._hCls){conn.send({type:'go',h:window._hCls,g:window._gCls});beginGame(window._hCls,window._gCls);}}}
function beginFromNet(msg){beginGame(msg.h,msg.g);}

function beginGame(c1,c2){
  document.getElementById('select-screen').style.display='none';
  document.getElementById('hud').style.display='flex';
  document.getElementById('floor-display').style.display='block';
  document.getElementById('gold-display').style.display='block';
  document.body.classList.add('in-game');
  floor=1;roomsCleared=0;totalKills=0;gold=0;
  spawnPlayers(c1,c2);
  if(mode!=='guest'){
    // Host/local: generate dungeon and enter first room
    document.getElementById('minimap-wrap').style.display='block';
    const start=generateFloor();enterRoom(start);
  } else {
    // Guest: just set up a dummy room, state will come from host
    currentRoom={doors:{n:false,s:false,e:false,w:false},visited:true,type:'combat',gx:2,gy:2};
    doorsOpen=false;
  }
  gamePhase='countdown';countdownTimer=3;sfx('door');
  // Snap camera to center immediately
  if(W>=RW)camX=(W-RW)/2; else camX=20;
  if(H>=RH+60)camY=(H-60-RH)/2; else camY=20;
}

let netTimer=0;
function sendState(){if(!conn||!conn.open||mode!=='host')return;
  const msg={type:'state',
    p:players.map(p=>({x:~~p.x,y:~~p.y,a:Math.round(p.angle*100)/100,hp:p.hp,mhp:p.maxHp,mn:~~p.mana,mmn:p.maxMana,al:p.alive,
      cd:p.cd.map(c=>Math.round(c*10)/10),if:p.iframes>0})),
    e:enemies.map(e=>({t:e.type,x:~~e.x,y:~~e.y,hp:e.hp,mhp:e.maxHp,al:e.alive,tgt:e.target})),
    sp:spells.map(s=>({x:~~s.x,y:~~s.y,vx:~~s.vx,vy:~~s.vy,r:s.radius,c:s.color,o:s.owner})),
    ep:eProj.map(p=>({x:~~p.x,y:~~p.y,r:p.radius,c:p.color})),
    zn:zones.map(z=>({x:~~z.x,y:~~z.y,r:z.radius,c:z.color,age:z.age,dur:z.duration})),
    aoe:aoeMarkers.map(m=>({x:~~m.x,y:~~m.y,r:m.radius,c:m.color,age:m.age,del:m.delay})),
    pk:pickups.filter(p=>!p.collected).map(p=>({x:~~p.x,y:~~p.y,t:p.type})),
    pl:pillars.map(p=>({x:~~p.x,y:~~p.y,r:~~p.radius})),
    doors:currentRoom?currentRoom.doors:null,
    dOpen:doorsOpen,rClr:roomCleared,
    fl:floor,rc:roomsCleared,g:gold,gp:gamePhase,ct:countdownTimer,
    sc:screenFlash>0?screenFlash:0,sk:shakeI>0?shakeI:0,
  };
  try{conn.send(msg);}catch(e){}
}

function applyState(msg){
  // Players
  if(msg.p)msg.p.forEach((pd,i)=>{
    if(!players[i])return;
    players[i].x=pd.x;players[i].y=pd.y;players[i].angle=pd.a;
    players[i].hp=pd.hp;players[i].maxHp=pd.mhp;players[i].mana=pd.mn;players[i].maxMana=pd.mmn;
    players[i].alive=pd.al;players[i].iframes=pd.if?0.1:0;
    for(let j=0;j<3;j++)players[i].cd[j]=pd.cd[j]||0;
  });
  // Enemies — replace entirely
  if(msg.e){enemies.length=0;for(const ed of msg.e){
    enemies.push({type:ed.t,x:ed.x,y:ed.y,hp:ed.hp,maxHp:ed.mhp,alive:ed.al,target:ed.tgt,
      vx:0,vy:0,atkTimer:1,iframes:0,slowTimer:0,stunTimer:0});}}
  // Spells
  if(msg.sp){spells.length=0;for(const sd of msg.sp){
    spells.push({x:sd.x,y:sd.y,vx:sd.vx,vy:sd.vy,radius:sd.r,color:sd.c,owner:sd.o,
      trail:sd.c,life:2,age:0,speed:0,dmg:0});}}
  // Enemy projectiles
  if(msg.ep){eProj.length=0;for(const pd of msg.ep){
    eProj.push({x:pd.x,y:pd.y,vx:0,vy:0,radius:pd.r,color:pd.c,life:1,dmg:0});}}
  // Zones
  if(msg.zn){zones.length=0;for(const zd of msg.zn){
    zones.push({x:zd.x,y:zd.y,radius:zd.r,color:zd.c,age:zd.age,duration:zd.dur,tickTimer:1,tickRate:1,dmg:0,owner:0,slow:0});}}
  // AOE markers
  if(msg.aoe){aoeMarkers.length=0;for(const ad of msg.aoe){
    aoeMarkers.push({x:ad.x,y:ad.y,radius:ad.r,color:ad.c,age:ad.age,delay:ad.del,dmg:0,owner:0});}}
  // Pickups
  if(msg.pk){pickups.length=0;for(const pd of msg.pk){
    pickups.push({x:pd.x,y:pd.y,type:pd.t,collected:false});}}
  // Pillars
  if(msg.pl){pillars.length=0;for(const pd of msg.pl){
    pillars.push({x:pd.x,y:pd.y,radius:pd.r});}}
  // Room state
  if(msg.doors){if(!currentRoom)currentRoom={doors:msg.doors,visited:true,type:'combat',gx:2,gy:2};
    else currentRoom.doors=msg.doors;}
  if(msg.dOpen!==undefined)doorsOpen=msg.dOpen;
  if(msg.rClr!==undefined)roomCleared=msg.rClr;
  // Globals
  if(msg.fl){floor=msg.fl;document.getElementById('floor-num').textContent=floor;}
  if(msg.rc!==undefined){roomsCleared=msg.rc;document.getElementById('room-num').textContent=roomsCleared+1;}
  if(msg.g!==undefined)gold=msg.g;
  if(msg.gp)gamePhase=msg.gp;
  if(msg.ct!==undefined)countdownTimer=msg.ct;
  if(msg.sc>0)screenFlash=Math.max(screenFlash,msg.sc);
  if(msg.sk>0)shake(msg.sk);
}

// ═══════════════════════════════════
//       MAIN LOOP
// ═══════════════════════════════════
let lastTime=performance.now();
function loop(now){
  let dt=Math.min((now-lastTime)/1000,.05);lastTime=now;time+=dt;

  if(gamePhase==='lobby'||gamePhase==='select'||gamePhase==='upgrade'||gamePhase==='gameover'){requestAnimationFrame(loop);return;}
  if(gamePhase==='countdown'){countdownTimer-=dt;if(countdownTimer<=0)gamePhase='playing';}

  if(mode!=='guest'){
    updatePlayers(dt);updateSpells(dt);updateAoe(dt);updateZones(dt);updateEnemies(dt);updateEProj(dt);
    checkDoors();
    netTimer-=dt;if(netTimer<=0){netTimer=.05;sendState();}
  }
  // Guest: send input every frame
  if(mode==='guest'&&conn&&conn.open){
    const inp=getInput(localIdx);
    try{conn.send({type:'input',...inp});}catch(e){}
  }

  updateCamera();updateFx(dt);updateHUD();drawMinimap();

  ctx.fillStyle='#04030a';ctx.fillRect(0,0,W,H);
  ctx.save();ctx.translate(camX+shakeX,camY+shakeY);
  drawRoom();drawZones();drawAoe();drawPillars();drawPickups();
  drawEProj();drawSpells();drawBeams();drawEnemies();
  for(const p of players)drawWizard(p);
  drawFx();drawCrosshair();drawCountdown();
  ctx.restore();
  if(screenFlash>0){ctx.fillStyle=`rgba(255,255,255,${screenFlash*.25})`;ctx.fillRect(0,0,W,H);}

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
