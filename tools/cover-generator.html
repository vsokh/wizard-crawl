<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spellstorm - Cover Image Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0812;
    color: #ccbbee;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
    min-height: 100vh;
  }
  h1 {
    font-size: 20px;
    margin-bottom: 16px;
    color: #9966cc;
    letter-spacing: 2px;
  }
  #preview-canvas {
    border: 1px solid #2a1f3e;
    border-radius: 4px;
    box-shadow: 0 0 40px rgba(153, 102, 204, 0.15);
  }
  .controls {
    margin-top: 20px;
    display: flex;
    gap: 12px;
  }
  button {
    background: linear-gradient(135deg, #9966cc, #6633aa);
    color: #fff;
    border: none;
    padding: 12px 28px;
    font-size: 15px;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: transform 0.1s, box-shadow 0.2s;
  }
  button:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(153, 102, 204, 0.4);
  }
  button:active { transform: translateY(0); }
  .info {
    margin-top: 12px;
    font-size: 13px;
    color: #665588;
  }
</style>
</head>
<body>

<h1>SPELLSTORM &mdash; Cover Image Generator</h1>
<canvas id="preview-canvas" width="1260" height="1000"></canvas>
<div class="controls">
  <button id="btn-download">Download PNG (630x500)</button>
</div>
<div class="info">Preview is 2x. Export saves at 630&times;500 for itch.io.</div>

<script>
(function() {
  "use strict";

  // === Constants ===
  const W = 630;
  const H = 500;
  const SCALE = 2;

  const previewCanvas = document.getElementById("preview-canvas");
  const previewCtx = previewCanvas.getContext("2d");

  const exportCanvas = document.createElement("canvas");
  exportCanvas.width = W;
  exportCanvas.height = H;
  const exportCtx = exportCanvas.getContext("2d");

  // === Seeded random for deterministic layouts ===
  let seed = 42;
  function srand(s) { seed = s; }
  function rand() {
    seed = (seed * 16807 + 0) % 2147483647;
    return (seed - 1) / 2147483646;
  }

  // === Utility ===
  function hexToRgb(hex) {
    return {
      r: parseInt(hex.slice(1, 3), 16),
      g: parseInt(hex.slice(3, 5), 16),
      b: parseInt(hex.slice(5, 7), 16),
    };
  }

  function lerp(a, b, t) { return a + (b - a) * t; }
  function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

  // === Pre-generate random data ===
  srand(42);

  // Stone floor tiles
  const TILE_SIZE = 35;
  const TILES = [];
  for (let tx = 0; tx < W; tx += TILE_SIZE) {
    for (let ty = Math.floor(H * 0.4); ty < H; ty += TILE_SIZE) {
      TILES.push({ x: tx, y: ty, brightness: rand() * 0.04 - 0.02 });
    }
  }

  // Floor cracks
  const CRACKS = [];
  for (let i = 0; i < 30; i++) {
    const sx = rand() * W;
    const sy = H * 0.4 + rand() * H * 0.55;
    const segs = [];
    let cx = sx, cy = sy;
    const segCount = 2 + Math.floor(rand() * 4);
    for (let s = 0; s < segCount; s++) {
      cx += (rand() - 0.5) * 28;
      cy += (rand() - 0.5) * 18;
      segs.push({ x: cx, y: cy });
    }
    CRACKS.push({ start: { x: sx, y: sy }, segs });
  }

  // Floating motes
  const MOTE_COLORS = ["#9966cc", "#44bbff", "#ffcc44", "#bb66ff", "#ff6633", "#55cc55", "#ff55aa"];
  const MOTES = [];
  for (let i = 0; i < 40; i++) {
    MOTES.push({
      x: rand() * W,
      y: rand() * H,
      r: 0.8 + rand() * 2.2,
      color: MOTE_COLORS[Math.floor(rand() * MOTE_COLORS.length)],
      alpha: 0.15 + rand() * 0.35,
      phase: rand() * Math.PI * 2,
      speed: 0.3 + rand() * 0.7,
      drift: (rand() - 0.5) * 0.3,
    });
  }

  // Fireballs (left side)
  const FIREBALLS = [];
  for (let i = 0; i < 7; i++) {
    const angle = Math.PI + (rand() - 0.5) * 0.9; // leftward spread
    const dist = 50 + rand() * 130;
    FIREBALLS.push({
      angle,
      dist,
      r: 6 + rand() * 10,
      phase: rand() * Math.PI * 2,
      brightness: 0.7 + rand() * 0.3,
    });
  }

  // Fire sparks
  const FIRE_SPARKS = [];
  for (let i = 0; i < 25; i++) {
    const angle = Math.PI + (rand() - 0.5) * 1.0;
    const dist = 30 + rand() * 150;
    FIRE_SPARKS.push({
      angle, dist,
      r: 0.6 + rand() * 1.8,
      alpha: 0.3 + rand() * 0.5,
      phase: rand() * Math.PI * 2,
    });
  }

  // Ice shards (right side)
  const ICE_SHARDS = [];
  for (let i = 0; i < 5; i++) {
    const angle = (rand() - 0.5) * 0.9; // rightward spread
    const dist = 50 + rand() * 120;
    ICE_SHARDS.push({
      angle,
      dist,
      length: 10 + rand() * 14,
      width: 3 + rand() * 4,
      rotation: angle + (rand() - 0.5) * 0.4,
      phase: rand() * Math.PI * 2,
      brightness: 0.7 + rand() * 0.3,
    });
  }

  // Ice particles
  const ICE_PARTICLES = [];
  for (let i = 0; i < 20; i++) {
    const angle = (rand() - 0.5) * 1.0;
    const dist = 30 + rand() * 140;
    ICE_PARTICLES.push({
      angle, dist,
      r: 0.5 + rand() * 1.5,
      alpha: 0.3 + rand() * 0.4,
      phase: rand() * Math.PI * 2,
    });
  }

  // Vortex arcs
  const VORTEX_COLORS = ["#bb66ff", "#ffcc44", "#55cc55", "#ff55aa", "#9966cc", "#44bbff"];
  const VORTEX_ARCS = [];
  for (let i = 0; i < 14; i++) {
    VORTEX_ARCS.push({
      startAngle: rand() * Math.PI * 2,
      sweep: 0.5 + rand() * 1.5,
      radius: 30 + rand() * 70,
      offsetY: (rand() - 0.5) * 30,
      color: VORTEX_COLORS[Math.floor(rand() * VORTEX_COLORS.length)],
      alpha: 0.08 + rand() * 0.18,
      lineWidth: 0.6 + rand() * 1.8,
      speed: 0.15 + rand() * 0.35,
      direction: rand() > 0.5 ? 1 : -1,
    });
  }

  // Enemy definitions
  // Left enemies (hit by fire)
  const LEFT_ENEMIES = [
    { type: "slime",    x: 55,  y: 345, size: 22 },
    { type: "bat",      x: 95,  y: 310, size: 18 },
    { type: "skeleton", x: 35,  y: 370, size: 28 },
    { type: "slime",    x: 115, y: 365, size: 16 },
  ];
  // Right enemies (hit by ice)
  const RIGHT_ENEMIES = [
    { type: "skeleton", x: 575, y: 345, size: 26 },
    { type: "bat",      x: 535, y: 308, size: 18 },
    { type: "slime",    x: 595, y: 370, size: 20 },
    { type: "bat",      x: 510, y: 355, size: 15 },
  ];

  // Wizard positions
  const WIZARD_CX = W / 2;      // center X
  const WIZARD_Y_BASE = 360;    // feet position
  const WIZARD_HEIGHT = 80;
  const WIZARD_SPACING = 20;    // half-gap between the two wizards

  // Fire wizard (left-facing)
  const FIRE_WIZ = {
    x: WIZARD_CX - WIZARD_SPACING,
    yBase: WIZARD_Y_BASE,
    facing: -1, // left
    bodyColor: "#662200",
    highlightColor: "#ff6633",
    glowColor: "rgba(255, 102, 51, 0.15)",
  };
  // Ice wizard (right-facing)
  const ICE_WIZ = {
    x: WIZARD_CX + WIZARD_SPACING,
    yBase: WIZARD_Y_BASE,
    facing: 1, // right
    bodyColor: "#003366",
    highlightColor: "#44bbff",
    glowColor: "rgba(68, 187, 255, 0.15)",
  };

  // Hand positions for spell origins
  function getHandPos(wiz) {
    const armLen = 32;
    return {
      x: wiz.x + wiz.facing * armLen,
      y: wiz.yBase - WIZARD_HEIGHT * 0.55,
    };
  }

  // =========================================================
  //  DRAW FUNCTIONS
  // =========================================================

  function drawBackground(ctx) {
    // Main vertical gradient
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, "#07050e");
    grad.addColorStop(0.4, "#0d0a16");
    grad.addColorStop(1, "#1a0f2e");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Stone floor tiles (color variation)
    for (const tile of TILES) {
      const b = tile.brightness;
      const r = Math.max(0, Math.min(255, Math.round(13 + b * 255)));
      const g = Math.max(0, Math.min(255, Math.round(10 + b * 255)));
      const bv = Math.max(0, Math.min(255, Math.round(22 + b * 255)));
      ctx.fillStyle = "rgba(" + r + "," + g + "," + bv + ",0.3)";
      ctx.fillRect(tile.x, tile.y, TILE_SIZE, TILE_SIZE);
    }

    // Grid lines
    ctx.strokeStyle = "rgba(60,40,80,0.08)";
    ctx.lineWidth = 0.5;
    for (let x = 0; x < W; x += TILE_SIZE) {
      ctx.beginPath();
      ctx.moveTo(x, H * 0.4);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
    for (let y = Math.floor(H * 0.4); y < H; y += TILE_SIZE) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }

    // Cracks
    ctx.strokeStyle = "rgba(40,25,55,0.2)";
    ctx.lineWidth = 0.7;
    for (const crack of CRACKS) {
      ctx.beginPath();
      ctx.moveTo(crack.start.x, crack.start.y);
      for (const seg of crack.segs) ctx.lineTo(seg.x, seg.y);
      ctx.stroke();
    }

    // Central purple radial glow (behind wizards)
    const glow = ctx.createRadialGradient(W / 2, H * 0.6, 0, W / 2, H * 0.6, W * 0.45);
    glow.addColorStop(0, "rgba(153,102,204,0.15)");
    glow.addColorStop(0.5, "rgba(153,102,204,0.05)");
    glow.addColorStop(1, "rgba(153,102,204,0)");
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);
  }

  // --- Wizard drawing ---
  function drawWizard(ctx, wiz) {
    const x = wiz.x;
    const yFeet = wiz.yBase;
    const facing = wiz.facing;
    const h = WIZARD_HEIGHT;

    ctx.save();

    // Glow around wizard
    const glowGrad = ctx.createRadialGradient(x, yFeet - h * 0.45, 0, x, yFeet - h * 0.45, h * 0.7);
    glowGrad.addColorStop(0, wiz.glowColor);
    glowGrad.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = glowGrad;
    ctx.beginPath();
    ctx.arc(x, yFeet - h * 0.45, h * 0.7, 0, Math.PI * 2);
    ctx.fill();

    // Robe (trapezoid)
    const robeTopW = 12;
    const robeBotW = 30;
    const robeTop = yFeet - h * 0.5;
    const robeBot = yFeet;
    ctx.fillStyle = wiz.bodyColor;
    ctx.beginPath();
    ctx.moveTo(x - robeBotW / 2, robeBot);
    ctx.lineTo(x + robeBotW / 2, robeBot);
    ctx.lineTo(x + robeTopW / 2, robeTop);
    ctx.lineTo(x - robeTopW / 2, robeTop);
    ctx.closePath();
    ctx.fill();

    // Robe highlight outline
    ctx.strokeStyle = wiz.highlightColor;
    ctx.lineWidth = 1.2;
    ctx.globalAlpha = 0.7;
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Head
    const headY = robeTop - 8;
    const headR = 8;
    ctx.fillStyle = wiz.bodyColor;
    ctx.beginPath();
    ctx.arc(x, headY, headR, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = wiz.highlightColor;
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.6;
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Hat (pointed triangle)
    const hatBase = headY - headR + 2;
    const hatTip = headY - headR - 20;
    const hatW = 12;
    ctx.fillStyle = wiz.bodyColor;
    ctx.beginPath();
    ctx.moveTo(x - hatW / 2, hatBase);
    ctx.lineTo(x + hatW / 2, hatBase);
    ctx.lineTo(x + facing * 4, hatTip); // tip leans in facing direction
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = wiz.highlightColor;
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.6;
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Hat brim
    ctx.strokeStyle = wiz.highlightColor;
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.moveTo(x - 11, hatBase + 1);
    ctx.lineTo(x + 11, hatBase + 1);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Casting arm (extended outward)
    const shoulderX = x + facing * 5;
    const shoulderY = robeTop + 6;
    const hand = getHandPos(wiz);
    ctx.strokeStyle = wiz.highlightColor;
    ctx.lineWidth = 2.5;
    ctx.globalAlpha = 0.8;
    ctx.beginPath();
    ctx.moveTo(shoulderX, shoulderY);
    ctx.lineTo(hand.x, hand.y);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Glowing orb at hand
    const orbGrad = ctx.createRadialGradient(hand.x, hand.y, 0, hand.x, hand.y, 8);
    const hlRgb = hexToRgb(wiz.highlightColor);
    orbGrad.addColorStop(0, "rgba(255,255,255,0.8)");
    orbGrad.addColorStop(0.3, wiz.highlightColor);
    orbGrad.addColorStop(1, "rgba(" + hlRgb.r + "," + hlRgb.g + "," + hlRgb.b + ",0)");
    ctx.fillStyle = orbGrad;
    ctx.beginPath();
    ctx.arc(hand.x, hand.y, 8, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  // --- Fire spell effects ---
  function drawFireSpells(ctx, time) {
    const hand = getHandPos(FIRE_WIZ);
    ctx.save();

    // Flame stream from hand to nearest fireball
    const nearest = FIREBALLS.reduce((a, b) => a.dist < b.dist ? a : b);
    const nx = hand.x + Math.cos(nearest.angle) * nearest.dist * 0.6;
    const ny = hand.y + Math.sin(nearest.angle) * nearest.dist * 0.6;

    // Tapered flame stream
    const streamGrad = ctx.createLinearGradient(hand.x, hand.y, nx, ny);
    streamGrad.addColorStop(0, "rgba(255,200,50,0.6)");
    streamGrad.addColorStop(0.5, "rgba(255,102,51,0.35)");
    streamGrad.addColorStop(1, "rgba(255,60,20,0)");
    ctx.strokeStyle = streamGrad;
    ctx.lineWidth = 6;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(hand.x, hand.y);
    ctx.quadraticCurveTo(
      hand.x + (nx - hand.x) * 0.5,
      hand.y - 8,
      nx, ny
    );
    ctx.stroke();
    // Inner bright line
    ctx.strokeStyle = "rgba(255,255,150,0.3)";
    ctx.lineWidth = 2;
    ctx.stroke();

    // Fireballs
    for (const fb of FIREBALLS) {
      const pulse = 1 + Math.sin(time * 3 + fb.phase) * 0.15;
      const fx = hand.x + Math.cos(fb.angle) * fb.dist;
      const fy = hand.y + Math.sin(fb.angle) * fb.dist;
      const r = fb.r * pulse;

      // Outer glow
      const glow = ctx.createRadialGradient(fx, fy, 0, fx, fy, r * 2.2);
      glow.addColorStop(0, "rgba(255,150,30," + (0.3 * fb.brightness) + ")");
      glow.addColorStop(0.5, "rgba(255,80,20," + (0.12 * fb.brightness) + ")");
      glow.addColorStop(1, "rgba(255,40,10,0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(fx, fy, r * 2.2, 0, Math.PI * 2);
      ctx.fill();

      // Core
      const core = ctx.createRadialGradient(fx, fy, 0, fx, fy, r);
      core.addColorStop(0, "rgba(255,255,180,0.9)");
      core.addColorStop(0.35, "rgba(255,180,50," + (0.8 * fb.brightness) + ")");
      core.addColorStop(0.7, "rgba(255,100,30," + (0.5 * fb.brightness) + ")");
      core.addColorStop(1, "rgba(255,60,20,0)");
      ctx.fillStyle = core;
      ctx.beginPath();
      ctx.arc(fx, fy, r, 0, Math.PI * 2);
      ctx.fill();
    }

    // Fire sparks
    for (const sp of FIRE_SPARKS) {
      const sx = hand.x + Math.cos(sp.angle) * sp.dist;
      const sy = hand.y + Math.sin(sp.angle) * sp.dist;
      const flicker = sp.alpha * (0.5 + Math.sin(time * 5 + sp.phase) * 0.5);
      ctx.fillStyle = "rgba(255,180,50," + flicker + ")";
      ctx.beginPath();
      ctx.arc(sx, sy, sp.r, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  // --- Ice spell effects ---
  function drawIceSpells(ctx, time) {
    const hand = getHandPos(ICE_WIZ);
    ctx.save();

    // Frost beam from hand
    const nearest = ICE_SHARDS.reduce((a, b) => a.dist < b.dist ? a : b);
    const nx = hand.x + Math.cos(nearest.angle) * nearest.dist * 0.6;
    const ny = hand.y + Math.sin(nearest.angle) * nearest.dist * 0.6;

    const beamGrad = ctx.createLinearGradient(hand.x, hand.y, nx, ny);
    beamGrad.addColorStop(0, "rgba(170,220,255,0.5)");
    beamGrad.addColorStop(0.5, "rgba(68,187,255,0.3)");
    beamGrad.addColorStop(1, "rgba(68,187,255,0)");
    ctx.strokeStyle = beamGrad;
    ctx.lineWidth = 5;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(hand.x, hand.y);
    ctx.quadraticCurveTo(
      hand.x + (nx - hand.x) * 0.5,
      hand.y - 6,
      nx, ny
    );
    ctx.stroke();
    ctx.strokeStyle = "rgba(220,240,255,0.25)";
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Ice shards (elongated diamonds)
    for (const shard of ICE_SHARDS) {
      const pulse = 1 + Math.sin(time * 2.5 + shard.phase) * 0.12;
      const sx = hand.x + Math.cos(shard.angle) * shard.dist;
      const sy = hand.y + Math.sin(shard.angle) * shard.dist;
      const len = shard.length * pulse;
      const w = shard.width * pulse;

      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(shard.rotation);

      // Shard glow
      const glowGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, len * 1.5);
      glowGrad.addColorStop(0, "rgba(68,187,255," + (0.2 * shard.brightness) + ")");
      glowGrad.addColorStop(1, "rgba(68,187,255,0)");
      ctx.fillStyle = glowGrad;
      ctx.beginPath();
      ctx.arc(0, 0, len * 1.5, 0, Math.PI * 2);
      ctx.fill();

      // Diamond shape
      const shardGrad = ctx.createLinearGradient(-len, 0, len, 0);
      shardGrad.addColorStop(0, "rgba(68,187,255," + (0.4 * shard.brightness) + ")");
      shardGrad.addColorStop(0.4, "rgba(170,221,255," + (0.85 * shard.brightness) + ")");
      shardGrad.addColorStop(0.5, "rgba(220,240,255," + (0.95 * shard.brightness) + ")");
      shardGrad.addColorStop(0.6, "rgba(170,221,255," + (0.85 * shard.brightness) + ")");
      shardGrad.addColorStop(1, "rgba(68,187,255," + (0.4 * shard.brightness) + ")");
      ctx.fillStyle = shardGrad;
      ctx.beginPath();
      ctx.moveTo(-len, 0);
      ctx.lineTo(0, -w);
      ctx.lineTo(len, 0);
      ctx.lineTo(0, w);
      ctx.closePath();
      ctx.fill();

      // Bright edge
      ctx.strokeStyle = "rgba(200,235,255,0.5)";
      ctx.lineWidth = 0.5;
      ctx.stroke();

      ctx.restore();
    }

    // Ice particles (small dots and tiny 6-pointed stars)
    for (const p of ICE_PARTICLES) {
      const px = hand.x + Math.cos(p.angle) * p.dist;
      const py = hand.y + Math.sin(p.angle) * p.dist;
      const flicker = p.alpha * (0.5 + Math.sin(time * 4 + p.phase) * 0.5);

      if (p.r > 1.0) {
        // Tiny 6-pointed star
        ctx.save();
        ctx.translate(px, py);
        ctx.strokeStyle = "rgba(170,220,255," + flicker + ")";
        ctx.lineWidth = 0.5;
        for (let a = 0; a < 3; a++) {
          const angle = a * Math.PI / 3;
          ctx.beginPath();
          ctx.moveTo(Math.cos(angle) * -p.r * 1.5, Math.sin(angle) * -p.r * 1.5);
          ctx.lineTo(Math.cos(angle) * p.r * 1.5, Math.sin(angle) * p.r * 1.5);
          ctx.stroke();
        }
        ctx.restore();
      } else {
        ctx.fillStyle = "rgba(170,220,255," + flicker + ")";
        ctx.beginPath();
        ctx.arc(px, py, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    ctx.restore();
  }

  // --- Enemy drawing ---
  function drawSlime(ctx, x, y, size, color, glowColor) {
    // Blob shape
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.ellipse(x, y + size * 0.15, size * 0.45, size * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
    // Eyes (two dots)
    ctx.fillStyle = glowColor;
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.arc(x - size * 0.12, y + size * 0.05, 1.5, 0, Math.PI * 2);
    ctx.arc(x + size * 0.12, y + size * 0.05, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  function drawBat(ctx, x, y, size, color, glowColor) {
    // Body oval
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.ellipse(x, y, size * 0.2, size * 0.25, 0, 0, Math.PI * 2);
    ctx.fill();
    // Left wing
    ctx.beginPath();
    ctx.moveTo(x - size * 0.15, y - size * 0.05);
    ctx.lineTo(x - size * 0.55, y - size * 0.35);
    ctx.lineTo(x - size * 0.45, y + size * 0.05);
    ctx.lineTo(x - size * 0.15, y + size * 0.1);
    ctx.closePath();
    ctx.fill();
    // Right wing
    ctx.beginPath();
    ctx.moveTo(x + size * 0.15, y - size * 0.05);
    ctx.lineTo(x + size * 0.55, y - size * 0.35);
    ctx.lineTo(x + size * 0.45, y + size * 0.05);
    ctx.lineTo(x + size * 0.15, y + size * 0.1);
    ctx.closePath();
    ctx.fill();
    // Eyes
    ctx.fillStyle = glowColor;
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.arc(x - size * 0.07, y - size * 0.05, 1, 0, Math.PI * 2);
    ctx.arc(x + size * 0.07, y - size * 0.05, 1, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  function drawSkeleton(ctx, x, y, size, color, glowColor) {
    // Simple humanoid: head, torso line, arms, legs
    const headR = size * 0.12;
    const headY = y - size * 0.35;
    // Head
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, headY, headR, 0, Math.PI * 2);
    ctx.fill();
    // Torso
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x, headY + headR);
    ctx.lineTo(x, y + size * 0.1);
    ctx.stroke();
    // Arms
    ctx.beginPath();
    ctx.moveTo(x - size * 0.2, y - size * 0.12);
    ctx.lineTo(x, y - size * 0.18);
    ctx.lineTo(x + size * 0.2, y - size * 0.12);
    ctx.stroke();
    // Legs
    ctx.beginPath();
    ctx.moveTo(x, y + size * 0.1);
    ctx.lineTo(x - size * 0.15, y + size * 0.4);
    ctx.moveTo(x, y + size * 0.1);
    ctx.lineTo(x + size * 0.15, y + size * 0.4);
    ctx.stroke();
    // Eye sockets
    ctx.fillStyle = glowColor;
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.arc(x - headR * 0.35, headY - 1, 1, 0, Math.PI * 2);
    ctx.arc(x + headR * 0.35, headY - 1, 1, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  function drawEnemy(ctx, enemy, color, glowColor) {
    switch (enemy.type) {
      case "slime":    drawSlime(ctx, enemy.x, enemy.y, enemy.size, color, glowColor); break;
      case "bat":      drawBat(ctx, enemy.x, enemy.y, enemy.size, color, glowColor); break;
      case "skeleton": drawSkeleton(ctx, enemy.x, enemy.y, enemy.size, color, glowColor); break;
    }
  }

  function drawEnemies(ctx, time) {
    ctx.save();

    // Left enemies (fire-side) with impact glow
    for (let i = 0; i < LEFT_ENEMIES.length; i++) {
      const e = LEFT_ENEMIES[i];
      // Impact glow for closer enemies
      const impactAlpha = clamp(0.25 - i * 0.06, 0, 0.3);
      if (impactAlpha > 0) {
        const impGrad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.size * 1.2);
        impGrad.addColorStop(0, "rgba(255,120,30," + impactAlpha + ")");
        impGrad.addColorStop(1, "rgba(255,60,20,0)");
        ctx.fillStyle = impGrad;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.size * 1.2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 0.55 + Math.sin(time * 2 + i) * 0.08;
      drawEnemy(ctx, e, "#5a1a0a", "rgba(255,120,40,0.7)");
      ctx.globalAlpha = 1;
    }

    // Right enemies (ice-side) with frost overlay
    for (let i = 0; i < RIGHT_ENEMIES.length; i++) {
      const e = RIGHT_ENEMIES[i];
      // Frost glow
      const frostAlpha = clamp(0.2 - i * 0.04, 0, 0.25);
      if (frostAlpha > 0) {
        const frostGrad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.size * 1.2);
        frostGrad.addColorStop(0, "rgba(68,187,255," + frostAlpha + ")");
        frostGrad.addColorStop(1, "rgba(68,187,255,0)");
        ctx.fillStyle = frostGrad;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.size * 1.2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 0.5 + Math.sin(time * 2 + i + 2) * 0.08;
      drawEnemy(ctx, e, "#0a2a4a", "rgba(100,200,255,0.7)");
      ctx.globalAlpha = 1;

      // Crystallized frost overlay on first two enemies
      if (i < 2) {
        ctx.strokeStyle = "rgba(170,220,255,0.2)";
        ctx.lineWidth = 0.5;
        // Small ice crystal lines radiating out
        for (let a = 0; a < 6; a++) {
          const angle = a * Math.PI / 3;
          const len = e.size * 0.4;
          ctx.beginPath();
          ctx.moveTo(e.x, e.y);
          ctx.lineTo(e.x + Math.cos(angle) * len, e.y + Math.sin(angle) * len);
          ctx.stroke();
        }
      }
    }

    ctx.restore();
  }

  // --- Spell vortex above wizards ---
  function drawVortex(ctx, time) {
    const cx = W / 2;
    const cy = 200;
    ctx.save();

    // Subtle central glow for the vortex
    const vGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 80);
    vGlow.addColorStop(0, "rgba(153,102,204,0.08)");
    vGlow.addColorStop(1, "rgba(153,102,204,0)");
    ctx.fillStyle = vGlow;
    ctx.beginPath();
    ctx.arc(cx, cy, 80, 0, Math.PI * 2);
    ctx.fill();

    // Spiraling arcs
    for (const arc of VORTEX_ARCS) {
      const angle = arc.startAngle + time * arc.speed * arc.direction;
      ctx.strokeStyle = arc.color;
      ctx.globalAlpha = arc.alpha + Math.sin(time * 1.5 + arc.startAngle) * 0.04;
      ctx.lineWidth = arc.lineWidth;
      ctx.beginPath();
      ctx.arc(cx, cy + arc.offsetY, arc.radius, angle, angle + arc.sweep);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Energy tendrils from wizards up to vortex
    // Left wizard tendril (fire-colored)
    const fireHand = getHandPos(FIRE_WIZ);
    ctx.strokeStyle = "rgba(255,102,51,0.06)";
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(fireHand.x, fireHand.y - 20);
    ctx.quadraticCurveTo(cx - 40, cy + 40, cx - 10 + Math.sin(time * 0.5) * 8, cy);
    ctx.stroke();

    // Right wizard tendril (ice-colored)
    const iceHand = getHandPos(ICE_WIZ);
    ctx.strokeStyle = "rgba(68,187,255,0.06)";
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(iceHand.x, iceHand.y - 20);
    ctx.quadraticCurveTo(cx + 40, cy + 40, cx + 10 + Math.sin(time * 0.6) * 8, cy);
    ctx.stroke();

    ctx.restore();
  }

  // --- Floating motes ---
  function drawMotes(ctx, time) {
    for (const mote of MOTES) {
      const y = mote.y + Math.sin(time * mote.speed + mote.phase) * 8;
      const x = mote.x + Math.cos(time * mote.speed * 0.7 + mote.phase) * 4 + mote.drift * time * 2;
      const wrappedX = ((x % W) + W) % W;
      const flickerAlpha = mote.alpha * (0.6 + Math.sin(time * mote.speed * 3 + mote.phase) * 0.4);
      const rgb = hexToRgb(mote.color);

      // Glow
      ctx.fillStyle = "rgba(" + rgb.r + "," + rgb.g + "," + rgb.b + "," + (flickerAlpha * 0.3) + ")";
      ctx.beginPath();
      ctx.arc(wrappedX, y, mote.r * 2.5, 0, Math.PI * 2);
      ctx.fill();

      // Core
      ctx.fillStyle = "rgba(" + rgb.r + "," + rgb.g + "," + rgb.b + "," + flickerAlpha + ")";
      ctx.beginPath();
      ctx.arc(wrappedX, y, mote.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // --- Vignette ---
  function drawVignette(ctx) {
    // Radial vignette
    const vig = ctx.createRadialGradient(W / 2, H / 2, W * 0.25, W / 2, H / 2, W * 0.75);
    vig.addColorStop(0, "rgba(0,0,0,0)");
    vig.addColorStop(0.6, "rgba(0,0,0,0)");
    vig.addColorStop(1, "rgba(0,0,0,0.65)");
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, W, H);

    // Top edge darkening
    const topGrad = ctx.createLinearGradient(0, 0, 0, H * 0.15);
    topGrad.addColorStop(0, "rgba(7,5,14,0.6)");
    topGrad.addColorStop(1, "rgba(7,5,14,0)");
    ctx.fillStyle = topGrad;
    ctx.fillRect(0, 0, W, H * 0.15);

    // Bottom edge darkening
    const botGrad = ctx.createLinearGradient(0, H * 0.88, 0, H);
    botGrad.addColorStop(0, "rgba(7,5,14,0)");
    botGrad.addColorStop(1, "rgba(7,5,14,0.5)");
    ctx.fillStyle = botGrad;
    ctx.fillRect(0, H * 0.88, W, H * 0.12);
  }

  // --- Title ---
  function drawTitle(ctx) {
    const titleY = 75;
    ctx.save();

    // Glow pass
    ctx.font = 'bold 56px Georgia, "Times New Roman", serif';
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.shadowColor = "#9966cc";
    ctx.shadowBlur = 30;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;
    ctx.fillStyle = "rgba(153,102,204,0.4)";
    ctx.fillText("SPELLSTORM", W / 2, titleY);

    // Main gradient text
    ctx.shadowBlur = 15;
    ctx.shadowColor = "#bb88ee";
    const titleGrad = ctx.createLinearGradient(W / 2 - 180, titleY - 20, W / 2 + 180, titleY + 20);
    titleGrad.addColorStop(0, "#ff6633");
    titleGrad.addColorStop(0.45, "#ccaa44");
    titleGrad.addColorStop(1, "#9966cc");
    ctx.fillStyle = titleGrad;
    ctx.fillText("SPELLSTORM", W / 2, titleY);

    // Subtle stroke
    ctx.shadowBlur = 0;
    ctx.strokeStyle = "rgba(255,255,255,0.08)";
    ctx.lineWidth = 0.5;
    ctx.strokeText("SPELLSTORM", W / 2, titleY);

    ctx.restore();

    // Decorative line with diamond
    const lineY = titleY + 38;
    const lineW = 200;
    const lineGrad = ctx.createLinearGradient(W / 2 - lineW / 2, 0, W / 2 + lineW / 2, 0);
    lineGrad.addColorStop(0, "rgba(153,102,204,0)");
    lineGrad.addColorStop(0.3, "rgba(153,102,204,0.4)");
    lineGrad.addColorStop(0.5, "rgba(204,170,68,0.5)");
    lineGrad.addColorStop(0.7, "rgba(153,102,204,0.4)");
    lineGrad.addColorStop(1, "rgba(153,102,204,0)");
    ctx.strokeStyle = lineGrad;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(W / 2 - lineW / 2, lineY);
    ctx.lineTo(W / 2 + lineW / 2, lineY);
    ctx.stroke();

    // Diamond ornament
    ctx.fillStyle = "rgba(204,170,68,0.6)";
    ctx.save();
    ctx.translate(W / 2, lineY);
    ctx.rotate(Math.PI / 4);
    ctx.fillRect(-2.5, -2.5, 5, 5);
    ctx.restore();

    // Subtitle
    ctx.save();
    ctx.font = '16px Georgia, "Times New Roman", serif';
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.shadowColor = "#9966cc";
    ctx.shadowBlur = 8;
    ctx.fillStyle = "#ccbbee";
    ctx.fillText("Co-op Roguelike Wave Survival", W / 2, titleY + 56);
    ctx.restore();
  }

  // --- Bottom text ---
  function drawBottomText(ctx) {
    ctx.save();
    ctx.font = '12px Georgia, "Times New Roman", serif';
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "#887799";
    ctx.fillText("14 Wizard Classes  \u2022  Wave Survival  \u2022  P2P Co-op", W / 2, H - 24);
    ctx.restore();
  }

  // =========================================================
  //  MAIN DRAW
  // =========================================================
  function draw(ctx, time) {
    ctx.clearRect(0, 0, W, H);

    drawBackground(ctx);
    drawVortex(ctx, time);
    drawEnemies(ctx, time);
    drawFireSpells(ctx, time);
    drawIceSpells(ctx, time);
    drawWizard(ctx, FIRE_WIZ);
    drawWizard(ctx, ICE_WIZ);
    drawMotes(ctx, time);
    drawVignette(ctx);
    drawTitle(ctx);
    drawBottomText(ctx);
  }

  // === Animation loop (preview) ===
  let startTime = null;
  function animate(timestamp) {
    if (!startTime) startTime = timestamp;
    const time = (timestamp - startTime) / 1000;

    previewCtx.save();
    previewCtx.scale(SCALE, SCALE);
    draw(previewCtx, time);
    previewCtx.restore();

    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);

  // === Download ===
  document.getElementById("btn-download").addEventListener("click", function() {
    draw(exportCtx, 2.5);
    const link = document.createElement("a");
    link.download = "spellstorm-cover.png";
    link.href = exportCanvas.toDataURL("image/png");
    link.click();
  });

})();
</script>
